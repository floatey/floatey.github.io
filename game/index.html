<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>JDM Restoration Garage — TMCC</title>
  <link rel="stylesheet" href="css/game.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <a id="back-to-tmcc" href="../index.html">← Back to TMCC</a>

  <div id="game-root"></div>

  <noscript>
    <div style="padding:2rem;color:#cdd1e8;font-family:sans-serif;text-align:center;">
      <h2>JavaScript Required</h2>
      <p>JDM Restoration Garage needs JavaScript enabled to run. Please enable it in your browser settings.</p>
    </div>
  </noscript>

  <script type="module">
    // ── Firebase Realtime Database Init ──────────────────────────
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, push, remove }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAOVZlazcx9gktgnIthaM3iB_Q1-9wyarA",
      authDomain:        "test-531f9.firebaseapp.com",
      databaseURL:       "https://test-531f9-default-rtdb.firebaseio.com",
      projectId:         "test-531f9",
      storageBucket:     "test-531f9.firebasestorage.app",
      messagingSenderId: "365348741958",
      appId:             "1:365348741958:web:2886ae3d47789021917b47"
    };

    const app = initializeApp(firebaseConfig, "jdm-game");
    const db  = getDatabase(app);

    // Expose on window so sync.js (and other modules) can access without re-importing
    window._firebase = {
      db,
      ref:     (path) => ref(db, path),
      set,
      get,
      onValue,
      push,
      remove
    };

    window.dispatchEvent(new Event("firebaseReady"));
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
