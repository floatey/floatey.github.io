<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JDM Restoration Garage</title>
  <link rel="stylesheet" href="css/game.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       Fixed Header Bar
  ═══════════════════════════════════════ -->
  <header id="game-header">
    <div class="header-title">JDM Restoration Garage</div>

    <div class="header-right">
      <div class="header-currency font-data">
        <span id="hdr-yen">¥0</span>
        <span class="text-muted"> · </span>
        <span id="hdr-wt">0 WT</span>
      </div>

      <div class="header-sync" id="hdr-sync">
        <span class="sync-dot sync-saved" id="sync-dot"></span>
        <span class="sync-label" id="sync-label">Saved</span>
      </div>

      <button class="btn-icon" id="btn-mute" title="Toggle sound" aria-label="Toggle sound">🔊</button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════
       Main Content Root
  ═══════════════════════════════════════ -->
  <main id="game-root"></main>

  <!-- ═══════════════════════════════════════
       Firebase Compat SDK (CDN)
  ═══════════════════════════════════════ -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <!-- ═══════════════════════════════════════
       Firebase Config — replace placeholder
       values with your real project config
       from console.firebase.google.com
  ═══════════════════════════════════════ -->
  <script>
    // Wrap in try/catch so a missing or placeholder config never
    // blocks the rest of the game scripts from loading.
    try {
      const firebaseConfig = {
        apiKey:            "REPLACE_WITH_YOUR_API_KEY",
        authDomain:        "tmcc-game.firebaseapp.com",
        databaseURL:       "https://tmcc-game-default-rtdb.firebaseio.com",
        projectId:         "tmcc-game",
        storageBucket:     "tmcc-game.appspot.com",
        messagingSenderId: "REPLACE_WITH_YOUR_SENDER_ID",
        appId:             "REPLACE_WITH_YOUR_APP_ID"
      };
      firebase.initializeApp(firebaseConfig);
    } catch (e) {
      console.warn("[Firebase] Init skipped — replace placeholder config values:", e.message);
    }
  </script>

  <!-- ═══════════════════════════════════════
       Game Scripts — dependency order
  ═══════════════════════════════════════ -->
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/garage.js"></script>
  <script src="js/workbench.js"></script>
  <script src="js/wrench.js"></script>
  <script src="js/precision.js"></script>
  <script src="js/diagnosis.js"></script>
  <script src="js/bodywork.js"></script>
  <script src="js/gacha.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/social.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
