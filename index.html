const fmt = (d) => { if (!d) return ""; const dt = new Date(d + "T00:00:00"); return dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }); };
const fmtFull = (d) => { if (!d) return ""; const dt = new Date(d + "T00:00:00"); return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); };
const daysBetween = (a, b) => Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000);
const addDays = (d, n) => { const dt = new Date(d + "T00:00:00"); dt.setDate(dt.getDate() + n); return dt.toISOString().slice(0, 10); };
// All dates standardized to America/New_York (EST/EDT)
const toEST = (date = new Date()) => new Date(date.toLocaleString("en-US", { timeZone: "America/New_York" }));
const todayStr = () => { const d = toEST(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); };
const nowESTiso = () => { const d = toEST(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0") + "T" + String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0"); };
const fmtDateTime = (iso) => { if (!iso) return ""; const [date, time] = iso.split("T"); const dt = new Date(date + "T00:00:00"); const d = dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }); return time ? d + " at " + time : d; };

const migrate = (data) => {
  if (!data) return null;
  if (!Array.isArray(data.sprints) || !Array.isArray(data.team)) return null;
  return {
    ...data,
    team: data.team,
    uma: data.uma ? data.uma : { ...DEFAULT_UMA },
    sprints: data.sprints.map(s => ({
      ...s,
      notes: s.notes || "",
      tasks: Array.isArray(s.tasks) ? s.tasks.map(t => {
        const existingLogs = Array.isArray(t.timeLogs) ? t.timeLogs : (
          (t.logged > 0) ? [{ id: uid(), hours: t.logged, loggedAt: t.completedAt || t.endDate || todayStr(), note: "Migrated from total" }] : []

          t.status !== "not-started" ? [{ status: t.status, changedAt: t.completedAt || t.startDate || todayStr() }] : []

          deps: [],

          notes: "",
          ...t,
          timeLogs: existingLogs,
          statusHistory: existingHistory,

  const pct = max > 0 ? clamp(value / max, 0, 1) : 0;
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)", flexShrink: 0 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth={stroke} />

// ─── PIE CHART ───
function PieChart({ slices, size = 130, label, total, unit = "" }) {
  const r = size / 2;
  const cx = r, cy = r;
  const innerR = r * 0.56;
  let cursor = -Math.PI / 2;
  const paths = slices.filter(s => s.value > 0).map(s => {
    const angle = (s.value / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(cursor);
    const y1 = cy + r * Math.sin(cursor);
    cursor += angle;
    const x2 = cx + r * Math.cos(cursor);
    const y2 = cy + r * Math.sin(cursor);
    const large = angle > Math.PI ? 1 : 0;
    return { ...s, d: `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`, angle };
  });

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 20, flex: 1 }}>
      <div style={{ position: "relative", flexShrink: 0 }}>
        <svg width={size} height={size}>
          {paths.length === 0
            ? <circle cx={cx} cy={cy} r={r} fill={T.border} />
            : paths.map((p, i) => <path key={i} d={p.d} fill={p.color} opacity={0.9} />)
          }
          <circle cx={cx} cy={cy} r={innerR} fill={T.bgCard} />
          <text x={cx} y={cy - 6} textAnchor="middle" fill={T.text} fontSize={18} fontWeight="700" fontFamily="JetBrains Mono">{total}{unit}</text>
          <text x={cx} y={cy + 12} textAnchor="middle" fill={T.textMuted} fontSize={9} fontWeight="600" letterSpacing="0.5">{label.toUpperCase()}</text>
        </svg>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 7, flex: 1 }}>
        {slices.map((s, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: s.color, flexShrink: 0 }} />
            <div style={{ display: "flex", alignItems: "center", gap: 5, flex: 1, minWidth: 0 }}>
              <div style={{ width: 22, height: 22, borderRadius: "50%", background: s.color + "18", border: "1.5px solid " + s.color + "50", color: s.color, fontSize: 8, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{s.initials}</div>
              <span style={{ fontSize: 12, color: T.textSub, flex: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{s.name}</span>
            </div>
            <span style={{ fontSize: 12, fontWeight: 700, color: s.color, fontFamily: "'JetBrains Mono'", flexShrink: 0 }}>{s.value}{unit}</span>
            <span style={{ fontSize: 10, color: T.textMuted, fontFamily: "'JetBrains Mono'", flexShrink: 0, minWidth: 30, textAlign: "right" }}>{total > 0 ? Math.round(s.value / total * 100) : 0}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── SMOOTH SVG PATH  (Catmull-Rom → cubic Bézier, tension 0–1) ───
// tension = 0   → straight segments (no smoothing)
// tension = 0.4 → smooth but hugs the data (default)
// tension = 1   → very loose / over-smoothed
const smoothPath = (pts, tension = 0.4) => {
  if (pts.length < 2) return "";
  if (pts.length === 2) return `M ${pts[0].x},${pts[0].y} L ${pts[1].x},${pts[1].y}`;
  const n = pts.length;
  let d = `M ${pts[0].x},${pts[0].y}`;
  for (let i = 0; i < n - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[Math.min(n - 1, i + 2)];
    // Catmull-Rom tangents → cubic Bézier control handles
    const cp1x = p1.x + (p2.x - p0.x) * tension / 2;
    const cp1y = p1.y + (p2.y - p0.y) * tension / 2;
    const cp2x = p2.x - (p3.x - p1.x) * tension / 2;
    const cp2y = p2.y - (p3.y - p1.y) * tension / 2;
    d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
  }
  return d;
};

  { label: "PST",  tz: "America/Los_Angeles", abbr: ["PST","PDT"] },
  { label: "UTC",  tz: "UTC",                 abbr: ["UTC"]       },
];

function getZoneTime(tz) {
  const now = new Date();
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: tz, hour: "numeric", minute: "2-digit", second: "2-digit",
    hour12: true, weekday: "short",
  }).formatToParts(now);
  const get = (t) => parts.find(p => p.type === t)?.value || "";
  const rawHour = get("hour");
  const min  = get("minute");
  const sec  = get("second");
  const ampm = get("dayperiod") || get("dayPeriod") || "";
  const weekday = get("weekday");
  // derive offset label
  const fmt = new Intl.DateTimeFormat("en-US", { timeZone: tz, timeZoneName: "short" });
  const tzName = fmt.formatToParts(now).find(p => p.type === "timeZoneName")?.value || tz;
  return { time: rawHour + ":" + min, sec, ampm: ampm.toLowerCase(), weekday, tzName };
}

              {primary.sec}
            </span>

            </span>
          </div>
          <div style={{ fontSize: 9, color: T.textMuted, letterSpacing: "0.5px", textTransform: "uppercase", marginTop: 1 }}>

      {/* Hover panel — all zones */}

// ═══════════════════════════════════════════════════════════════

// ── WRENCH WORK — Rhythm Tapper (spec §5.1) ──
// Tools: Impact Wrench (auto-5x/15 clicks), Penetrating Oil (-30% resistance)
function WrenchMechanic({ part, difficulty, skillLevel, tools, onComplete, onLog }) {
  const [progress, setProgress] = useState(0);
  const [combo, setCombo] = useState(1.0);
  const [clickCount, setClickCount] = useState(0);
  const [hazardActive, setHazardActive] = useState(false);
  const [hazardFailed, setHazardFailed] = useState(false);
  const [lastClickTime, setLastClickTime] = useState(0);
  const [momentumLevel, setMomentumLevel] = useState(0);
  const [flavorText, setFlavorText] = useState("");
  const [critFlash, setCritFlash] = useState(false);
  const [done, setDone] = useState(false);
  const nextHazRef = useRef(15 + Math.floor(Math.random() * 16));
  const nextCritRef = useRef(8 + Math.floor(Math.random() * 28));
  const comboRef = useRef(1.0);
  const progRef = useRef(0);

  const tier = GE.getSkillTier(skillLevel);
  const te = GE.getWrenchEffects(tools || {});
  const effDiff = te.hasPenOil ? difficulty * 0.7 : difficulty;
  const idealTempo = 300 - (effDiff * 120);
  const tempoWin = 80 + (skillLevel * 6) + (tier.bonus * 25);
  const baseVal = (0.8 + skillLevel * 0.15 + tier.bonus * 2) / (20 + effDiff * 40);

  useEffect(() => {
    const t = part.flavorText || ["Working..."]; let idx = 0;
    setFlavorText(t[0]);
    const iv = setInterval(() => { idx = (idx+1) % t.length; setFlavorText(t[idx]); }, 8000);
    return () => clearInterval(iv);
  }, []);

  const handleClick = useCallback(() => {
    if (done) return; GE.Audio.init();
    if (hazardActive) {
      setHazardFailed(true); setHazardActive(false);
      setCombo(1.0); comboRef.current = 1.0; setMomentumLevel(0);
      progRef.current = Math.max(0, progRef.current - 0.05);
      setProgress(progRef.current);
      GE.Audio.hazard(); onLog("⚠ Clicked through stuck bolt — momentum lost!");
      setTimeout(() => setHazardFailed(false), 600); return;
    }
    const now = performance.now(), dt = now - lastClickTime; setLastClickTime(now);
    let nc = comboRef.current;
    if (lastClickTime > 0 && Math.abs(dt - idealTempo) < tempoWin) { nc = Math.min(3.0, nc + 0.25); setMomentumLevel(l => Math.min(5, l+1)); }
    else if (lastClickTime > 0) { nc = 1.0; setMomentumLevel(0); }
    setCombo(nc); comboRef.current = nc;
    const count = clickCount + 1; setClickCount(count); GE.Audio.click();
    let gain = baseVal * nc;
    // Impact Wrench: auto-5x burst every 15th click (spec §6)
    if (te.hasImpact && count % te.impactInterval === 0) { gain *= 5; GE.Audio.critical(); onLog("⚡ Impact wrench burst!"); }
    // Critical: 3x-5x, variable ratio 8-35 (spec §5.1)
    if (count >= nextCritRef.current) {
      gain *= (3 + Math.random() * 2); setCritFlash(true); GE.Audio.critical();
      onLog("✦ " + GE.CRITICAL_FLAVOR[Math.floor(Math.random() * GE.CRITICAL_FLAVOR.length)]);
      setTimeout(() => setCritFlash(false), 400);
      nextCritRef.current = count + 8 + Math.floor(Math.random() * 28);
    }
    const np = Math.min(1, progRef.current + gain); progRef.current = np; setProgress(np);
    // Dynamic flavor at milestones
    if ((np > 0.25 && np-gain <= 0.25)||(np > 0.5 && np-gain <= 0.5)||(np > 0.75 && np-gain <= 0.75)||(np > 0.9 && np-gain <= 0.9)) setFlavorText(GE.getWrenchFlavor(np));
    if (np >= 1 && !done) { setDone(true); GE.Audio.complete(); onLog("✓ " + part.name + " — wrench work done!"); setTimeout(() => onComplete(), 500); return; }
    // Hazard: 15-30 click interval (spec §5.1)
    if (count >= nextHazRef.current && !done && np < 0.95) {
      setHazardActive(true); nextHazRef.current = count + 15 + Math.floor(Math.random() * 16);
      const hw = 1200 + (tier.bonus * 600);
      setTimeout(() => setHazardActive(h => { if (h) { onLog("✓ Backed it off, good call."); GE.Audio.uiClick(); return false; } return h; }), hw);
    }
  }, [done, hazardActive, lastClickTime, clickCount, idealTempo, tempoWin, baseVal, part, onComplete, onLog, te, tier]);

  const mc = ["#374151","#4b5563","#eab308","#f59e0b","#22c55e","#10b981"];
  const rc = effDiff > 0.7 ? "#ff4d6d" : effDiff > 0.4 ? "#f59e0b" : "#22c55e";
  return (
    <div style={{ padding: 16 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
        <div className="game-condensed" style={{ fontSize:14,color:"#9ca3af",fontWeight:500 }}>Wrenching: {part.name}</div>
        <div className="game-mono" style={{ fontSize:22,fontWeight:800,color:combo>=2.5?"#10b981":combo>=1.5?"#f59e0b":"#6b7280" }}>×{combo.toFixed(1)}</div>
      </div>
      {/* Resistance bar (spec wireframe) */}
      <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:12 }}>
        <span className="game-mono" style={{ fontSize:10,color:"#6b7280",minWidth:62 }}>Resistance</span>
        <div style={{ flex:1,height:6,background:"#1a1f35",borderRadius:3,overflow:"hidden" }}><div style={{ height:"100%",width:Math.round(effDiff*100)+"%",background:rc,borderRadius:3 }} /></div>
        <span className="game-mono" style={{ fontSize:10,color:rc }}>{effDiff>0.7?"HIGH":effDiff>0.4?"MED":"LOW"}</span>
        {te.hasPenOil && <span className="game-mono" style={{ fontSize:8,color:"#22c55e",background:"#22c55e15",padding:"1px 5px",borderRadius:8 }}>-30%</span>}
      </div>
      <div onClick={handleClick} style={{
        width:"100%",height:110,borderRadius:10,cursor:"pointer",userSelect:"none",
        background:hazardActive?"#ff4d6d12":critFlash?"#f59e0b15":"#0e1220",
        border:hazardActive?"2px solid #ff4d6d":critFlash?"2px solid #f59e0b":"2px solid #1a1f35",
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        transition:"all 0.08s",animation:hazardActive?"hazard-pulse 0.4s infinite":hazardFailed?"shake 0.3s":critFlash?"bolt-hit 0.15s":"none",
      }}>
        {done ? <div style={{ fontSize:28,color:"#22c55e" }}>✓</div>
         : hazardActive ? (<><div style={{ fontSize:20 }}>⚠️</div><div className="game-condensed" style={{ fontSize:18,fontWeight:700,color:"#ff4d6d" }}>STUCK — HOLD</div><div style={{ fontSize:10,color:"#ff4d6d70" }}>Don't click!</div></>)
         : (<><div style={{ fontSize:28,marginBottom:2 }}>🔧</div><div className="game-condensed" style={{ fontSize:15,fontWeight:600,color:"#e2e8f0" }}>TAP TO WRENCH</div>
            {te.hasImpact && <div className="game-mono" style={{ fontSize:9,color:"#f59e0b60" }}>Impact in {te.impactInterval - (clickCount % te.impactInterval)}</div>}</>)}
      </div>
      <div style={{ marginTop:12 }}>
        <div style={{ display:"flex",justifyContent:"space-between",marginBottom:3 }}>
          <span className="game-mono" style={{ fontSize:10,color:"#6b7280" }}>Progress</span>
          <span className="game-mono" style={{ fontSize:10,color:done?"#22c55e":"#e2e8f0" }}>{Math.round(progress*100)}%</span>
        </div>
        <div style={{ height:8,background:"#1a1f35",borderRadius:4,overflow:"hidden" }}>
          <div style={{ height:"100%",borderRadius:4,transition:critFlash?"width 0.04s":"width 0.12s",width:(progress*100)+"%",background:critFlash?"#f59e0b":done?"#22c55e":"#4e7fff" }} />
        </div>
      </div>
      <div style={{ marginTop:8,display:"flex",alignItems:"center",gap:8 }}>
        <span className="game-mono" style={{ fontSize:9,color:"#6b7280",minWidth:62 }}>Momentum</span>
        <div style={{ display:"flex",gap:3,flex:1 }}>{[0,1,2,3,4].map(i => <div key={i} style={{ flex:1,height:5,borderRadius:3,background:i<momentumLevel?mc[momentumLevel]:"#1a1f35",transition:"background 0.12s" }} />)}</div>
        <span className="game-mono" style={{ fontSize:9,color:momentumLevel>=4?"#10b981":momentumLevel>=2?"#f59e0b":"#4b5563" }}>{momentumLevel>=4?"PERFECT":momentumLevel>=2?"GOOD":"FIND RHYTHM"}</span>
      </div>
      <div style={{ marginTop:12,padding:"8px 10px",background:"#0a0d14",borderRadius:6,borderLeft:"2px solid #1a1f35" }}>
        <div style={{ fontSize:11,color:"#6b728080",fontStyle:"italic" }}>"{flavorText}"</div>
      </div>
    </div>
  );
}

// ── PRECISION WORK — Timing Target (spec §5.2) ──
// Tools: Torque Wrench (-15% sweep), Angle Gauge (+10% green). Red = 1-3% damage. VR: Perfect Torque.
function PrecisionMechanic({ part, difficulty, skillLevel, tools, onComplete, onLog }) {
  const tier = GE.getSkillTier(skillLevel);
  const te = GE.getPrecisionEffects(tools || {});
  const totalSteps = Math.max(3, Math.round(3 + difficulty * 5));
  const [results, setResults] = useState([]);
  const [sweepPos, setSweepPos] = useState(0);
  const [sweeping, setSweeping] = useState(true);
  const [flash, setFlash] = useState(null);
  const [done, setDone] = useState(false);
  const [perfStreak, setPerfStreak] = useState(0);
  const [vrBonus, setVrBonus] = useState(false);
  const [condDmg, setCondDmg] = useState(0);
  const animRef = useRef(null); const dirRef = useRef(1);

  const greenW = Math.max(5, 15 - difficulty*12 + tier.bonus*10 + (te.hasAngleGauge ? 3 : 0));
  const yellowW = greenW * 2.0;
  const speed = (0.35 + difficulty*0.55) * (1 - tier.bonus*0.15) * (te.hasTorqueWrench ? 0.85 : 1);

  useEffect(() => {
    if (!sweeping || done) return;
    const anim = () => { setSweepPos(p => { let n = p + dirRef.current*speed; if (n>=100||n<=0) { dirRef.current*=-1; n=Math.max(0,Math.min(100,n)); } return n; }); animRef.current = requestAnimationFrame(anim); };
    animRef.current = requestAnimationFrame(anim);
    return () => cancelAnimationFrame(animRef.current);
  }, [sweeping, done, speed]);

  const handleTap = useCallback(() => {
    if (!sweeping || done) return; GE.Audio.init(); setSweeping(false);
    const dist = Math.abs(sweepPos - 50); let result;
    if (dist <= greenW/2) { result="green"; GE.Audio.precisionHit(); setFlash("#22c55e"); }
    else if (dist <= yellowW/2) { result="yellow"; GE.Audio.uiClick(); setFlash("#eab308"); }
    else { result="red"; GE.Audio.precisionMiss(); setFlash("#ff4d6d"); setCondDmg(d => d + 0.01 + Math.random()*0.02); }
    // VR: Perfect Torque (spec §5.2: ~every 5th green, variable 3-8)
    let gotVR = false;
    if (result==="green") { const ns = perfStreak+1; setPerfStreak(ns);
      if (ns>=3 && (ns>=8 || Math.random()<0.25)) { gotVR=true; setVrBonus(true); setPerfStreak(0); onLog("★ PERFECT TORQUE — double XP!"); setTimeout(() => setVrBonus(false), 800); }
    } else { setPerfStreak(0); }
    const nr = [...results, result]; setResults(nr);
    if (!gotVR) onLog(result==="green"?"✦ Perfect.":result==="yellow"?"• Acceptable.":"✗ Miss — part took damage.");
    setTimeout(() => {
      setFlash(null);
      if (result==="red") { setResults(r => { const c=[...r]; c[c.length-1]="retry"; return c; }); }
      const active = nr.filter(r => r!=="retry");
      if (active.length >= totalSteps) {
        setDone(true); GE.Audio.complete(); onLog("✓ " + part.name + " — precision done!");
        setTimeout(() => onComplete({ results: nr, conditionDamage: condDmg }), 500);
      } else {
        setSweepPos(Math.random()<0.5 ? Math.random()*10 : 90+Math.random()*10);
        dirRef.current = Math.random()<0.5 ? 1 : -1; setSweeping(true);
      }
    }, 500);
  }, [sweeping, done, sweepPos, results, greenW, yellowW, totalSteps, part, onComplete, onLog, perfStreak, condDmg]);

  const active = results.filter(r => r!=="retry"); const greens = results.filter(r => r==="green").length;
  return (
    <div style={{ padding:16 }}>
      <div style={{ display:"flex",justifyContent:"space-between",marginBottom:10 }}>
        <div>
          <div className="game-condensed" style={{ fontSize:14,color:"#9ca3af",fontWeight:500 }}>Torquing: {part.name}</div>
          <div className="game-mono" style={{ fontSize:11,color:"#6b7280" }}>Step {Math.min(active.length+1,totalSteps)}/{totalSteps}{te.hasTorqueWrench?" · 🔧-15%":""}{te.hasAngleGauge?" · 📐+10%":""}</div>
        </div>
        <div style={{ display:"flex",alignItems:"center",gap:8 }}>
          {vrBonus && <span style={{ fontSize:11,color:"#f59e0b",fontWeight:700,animation:"fadeUp 0.3s" }}>★ 2×XP</span>}
          <span className="game-mono" style={{ fontSize:12,color:"#22c55e" }}>{greens}✓</span>
        </div>
      </div>
      <div onClick={handleTap} style={{ position:"relative",height:54,background:"#0e1220",borderRadius:8,overflow:"hidden",cursor:sweeping?"pointer":"default",border:vrBonus?"2px solid #f59e0b":flash?"2px solid "+flash:"2px solid #1a1f35",userSelect:"none" }}>
        <div style={{ position:"absolute",inset:0,background:"#ff4d6d12" }} />
        <div style={{ position:"absolute",top:0,bottom:0,left:(50-yellowW/2)+"%",width:yellowW+"%",background:"#eab30818" }} />
        <div style={{ position:"absolute",top:0,bottom:0,left:(50-greenW/2)+"%",width:greenW+"%",background:"#22c55e22",borderLeft:"1px solid #22c55e40",borderRight:"1px solid #22c55e40" }} />
        {sweeping && <div style={{ position:"absolute",top:4,bottom:4,left:sweepPos+"%",width:3,background:"#e2e8f0",borderRadius:2,transform:"translateX(-50%)",boxShadow:"0 0 8px #e2e8f0" }} />}
        {!sweeping && !done && <div style={{ position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:15,fontWeight:700,color:flash }}>{flash==="#22c55e"?"PERFECT":flash==="#eab308"?"OK":"MISS"}</div>}
        {done && <div style={{ position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:16,fontWeight:700,color:"#22c55e" }}>✓ DONE</div>}
      </div>
      <div style={{ display:"flex",gap:3,marginTop:8,justifyContent:"center",flexWrap:"wrap" }}>
        {Array.from({length:totalSteps},(_,i) => { const r=active[i]; const c=r==="green"?"#22c55e":r==="yellow"?"#eab308":r==="red"?"#ff4d6d":"#1a1f35"; return <div key={i} style={{ width:20,height:20,borderRadius:3,background:r?c+"30":"transparent",border:"1px solid "+(r?c:"#2a2f45"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:r?c:"#4b5563",fontWeight:700 }}>{r==="green"?"✓":r==="yellow"?"~":r==="red"?"✗":(i+1)}</div>; })}
      </div>
      {condDmg > 0 && <div className="game-mono" style={{ fontSize:10,color:"#ff4d6d80",textAlign:"center",marginTop:6 }}>⚠ Condition damage: -{Math.round(condDmg*100)}%</div>}
    </div>
  );
}

// ── DIAGNOSIS — Investigation Puzzle (spec §5.3) ──
// Wrong guess costs replacement cost of wrong part. Intuition at skill 10+.
function DiagnosisMechanic({ scenario, tools, diagLevel, allPartsRef, onComplete, onLog }) {
  const [revealedClues, setRevealedClues] = useState(["free"]);
  const [selected, setSelected] = useState(null);
  const [wrongGuesses, setWrongGuesses] = useState([]);
  const [solved, setSolved] = useState(false);
  const hasIntuition = GE.hasIntuition(diagLevel || 1);

  const allOptions = useMemo(() => {
    const opts = [scenario.correctDiagnosis, ...scenario.wrongOptions];
    for (let i=opts.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
    return opts;
  }, [scenario]);

  const ap = allPartsRef || GE.getAllParts(GE.getPartTree("ae86"));
  const getName = (id) => (ap.find(x => x.id===id)||{}).name || id;
  const getCost = (id) => (ap.find(x => x.id===id)||{}).replaceCost || 50;

  const clues = [];
  if (scenario.clues.free) scenario.clues.free.forEach(c => clues.push({type:"free",text:c,revealed:true}));
  const toolMap = [["multimeter","multimeter","Multimeter"],["compressionTester","compression_tester","Compression Tester"],["boostLeakTester","boost_leak_tester","Boost Leak Tester"]];
  for (const [ck,tid,tn] of toolMap) {
    if (scenario.clues[ck]) {
      const auto = tid==="multimeter" && tools[tid]; // Multimeter auto-reveals (spec §6)
      clues.push({type:ck,toolId:tid,toolName:tn,text:scenario.clues[ck],revealed:revealedClues.includes(ck)||auto});
    }
  }
  const revealClue = (t,tid) => { if (tools[tid]) { setRevealedClues(r => [...r,t]); GE.Audio.uiClick(); } };
  const submit = () => {
    if (!selected || solved || wrongGuesses.includes(selected)) return; GE.Audio.init();
    if (selected === scenario.correctDiagnosis) { setSolved(true); GE.Audio.diagCorrect(); onLog("✓ Correct! "+getName(selected)+" was the problem."); setTimeout(() => onComplete(true, wrongGuesses), 800); }
    else { const cost = getCost(selected); setWrongGuesses(w => [...w,selected]); setSelected(null); GE.Audio.diagWrong(); onLog("✗ Wrong — replaced "+getName(selected)+" for nothing. -¥"+cost); }
  };
  return (
    <div style={{ padding:16 }}>

function getGrade(total) {
  if (total >= 650) return { letter: "S+", color: "#ffd700" };
  if (total >= 550) return { letter: "S",  color: "#fbbf24" };
  if (total >= 480) return { letter: "A+", color: "#f97316" };
  if (total >= 420) return { letter: "A",  color: "#ff5270" };
  if (total >= 360) return { letter: "B+", color: "#b87fff" };
  if (total >= 300) return { letter: "B",  color: "#4e9fff" };
  if (total >= 240) return { letter: "C",  color: "#2ed09b" };
  return { letter: "D", color: T.textMuted };
}

function gradeGems(letter) {
  const map = {"S+":300,"S":250,"A+":200,"A":150,"B+":120,"B":80,"C":50,"D":30};
  return map[letter] || 30;
}

function getDlg(girl, category, sub) {
  const pool = sub ? DLG[category]?.[girl.personality]?.[sub] : DLG[category]?.[girl.personality];
  if (!pool) return "...";
  return pool[Math.floor(Math.random() * pool.length)];
}

function newCareer(girlId) {
  const girl = UMA_ROSTER.find(g => g.id === girlId);
  const stats = { speed: 30, stamina: 30, power: 30, guts: 30, wit: 30 };
  if (girl) stats[girl.bonus] += 20;
  return { girlId, turn: 0, energy: 100, mood: "good", stats, skillPts: 0, skills: [], raceResults: [], optRacesRun: [], finished: false, failed: false };
}

function calcTrainGain(stat, career, girl) {
  const base = stat === girl.bonus ? 19 : 14;
  const moodMult = MOOD_MULT[career.mood] || 1;
  // Diminishing returns: over 100 → ×0.80, over 140 → ×0.60
  const v = career.stats[stat];
  const dimMult = v >= 140 ? 0.60 : v >= 100 ? 0.80 : 1.0;
  // Skill: natural gift
  const skillMult = ( career.skills || [] ).includes("natural_gift") ? 1.15 : 1.0;
  return Math.round(base * moodMult * dimMult * skillMult * (0.85 + Math.random() * 0.3));
}

// ── WORKBENCH (spec §8) — system ceremony, donor parts, precision damage, sell/showcase ──
function GameWorkbench({ state, setState, vehicleId, onBack, onNavigateShop }) {
  const vehicle = state.garage.vehicles[vehicleId];
  const partTree = GE.getPartTree(vehicle?.modelId || "ae86");
  const [selectedPart, setSelectedPart] = useState(null);
  const [activeMech, setActiveMech] = useState(null);
  const [activeDiag, setActiveDiag] = useState(null);
  const [repairLog, setRepairLog] = useState(state.repairLog?.slice(0,30) || []);
  const [showFirstStart, setShowFirstStart] = useState(false);
  const [showSellModal, setShowSellModal] = useState(false);
  const [expandedSys, setExpandedSys] = useState({});
  const [sysCeremony, setSysCeremony] = useState(null);
  const prevCompRef = useRef(null);

  if (!vehicle) return <div style={{padding:40,color:"#6b7280"}}>Vehicle not found.</div>;
  const sysComp = GE.getSystemCompletion(partTree, vehicle.parts);
  const allParts = GE.getAllParts(partTree);
  const readyStart = GE.isReadyForFirstStart(partTree, vehicle.parts);
  const fullComplete = GE.isCarFullyComplete(partTree, vehicle.parts);
  const donorCount = state.currency?.donorParts?.[vehicle.modelId] || 0;

  // System completion ceremony: detect 100% transitions, award bonus (spec §6: 200-500¥)
  useEffect(() => {
    if (!prevCompRef.current) { prevCompRef.current = sysComp; return; }
    for (const [sid, comp] of Object.entries(sysComp)) {
      const prev = prevCompRef.current[sid];
      if (comp.pct >= 100 && prev && prev.pct < 100) {
        const bonus = GE.SYSTEM_COMPLETION_BONUS[sid] || 250;
        setState(s => ({...s, currency:{...s.currency, yen: s.currency.yen+bonus}, stats:{...s.stats, totalYenEarned: (s.stats.totalYenEarned||0)+bonus}}));
        const sysName = partTree.systems.find(s => s.id===sid)?.name || sid;
        setSysCeremony({name:sysName, bonus});
        addLog("🏆 SYSTEM COMPLETE: "+sysName+" — +¥"+bonus+"!");
        GE.Audio.complete();
        GE.postFeed({who:state.profileId, what:"completed_system", detail:"Completed "+sysName+" on "+partTree.displayName+"!"});
        setTimeout(() => setSysCeremony(null), 3000);
      }
    }
    prevCompRef.current = sysComp;
  }, [sysComp]);

  const addLog = (msg) => { const e={msg,time:Date.now()}; setRepairLog(l => [e,...l].slice(0,40)); setState(s => ({...s,repairLog:[e,...(s.repairLog||[])].slice(0,40)})); };
  const updatePart = (pid,u) => setState(s => {const v={...s.garage.vehicles[vehicleId]};v.parts={...v.parts,[pid]:{...v.parts[pid],...u}};return{...s,lastModified:Date.now(),garage:{...s.garage,vehicles:{...s.garage.vehicles,[vehicleId]:v}}};});
  const awardXp = (skill,xp) => setState(s => {const sk={...(s.skills?.[skill]||{level:1,xp:0})};sk.xp+=xp;const n=GE.xpForLevel(sk.level);if(sk.xp>=n&&sk.level<20){sk.level++;sk.xp-=n;addLog("⬆ "+skill+" → Lv."+sk.level+"!");}return{...s,skills:{...s.skills,[skill]:sk}};});

  const handleRepairComplete = (pd, mechResult) => {
    const cur = vehicle.parts[pd.id]; const skLv = state.skills?.[pd.repairType]?.level || 1;
    // Perfect Repair proc: skill 16+, 5%
    if (GE.rollPerfectRepair(skLv)) {
      updatePart(pd.id, {condition:1.0,repairProgress:1});
      addLog("★★ PERFECT REPAIR! "+pd.name+" → 100%!"); GE.Audio.complete();
    } else {
      let gain = 0.20 + Math.random()*0.30;
      let dmg = 0;
      // Precision: result is {results: [...], conditionDamage: number}
      if (mechResult && mechResult.results) {
        const greens = mechResult.results.filter(r => r==="green").length;
        const total = mechResult.results.filter(r => r!=="retry").length;
        gain = 0.15 + (greens/Math.max(1,total))*0.50;
        dmg = mechResult.conditionDamage || 0;
      }
      // Bodywork: result is quality scalar 0-1
      if (typeof mechResult === "number") gain = 0.15 + mechResult * 0.40;
      const base = (cur.condition || 0.1) - dmg; // apply precision damage first
      const nc = Math.min(0.95, Math.max(0.01, base) + gain);
      updatePart(pd.id, {condition:parseFloat(nc.toFixed(2)),repairProgress:1});
      if (dmg > 0) addLog("⚠ Precision damage applied: -"+Math.round(dmg*100)+"%");
    }
    awardXp(pd.repairType, Math.round(10+pd.difficulty*30));
    setState(s => ({...s,stats:{...s.stats,totalRepairs:(s.stats?.totalRepairs||0)+1}}));
    if (pd.hiddenReveal && Math.random() < pd.hiddenReveal.chance) { updatePart(pd.hiddenReveal.targetPartId, {condition:GE.generateArrivalCondition(partTree.rarity),revealed:true}); addLog("★ Discovered: "+pd.hiddenReveal.flavorText); }
    const yen = Math.round(20+pd.difficulty*50);
    setState(s => ({...s,currency:{...s.currency,yen:s.currency.yen+yen}})); addLog("+ ¥"+yen);
    setActiveMech(null); setSelectedPart(null);
  };

  const handleDiagComplete = (correct, wrongGuesses) => {
    awardXp("diagnosis", correct?40:10);
    // Spec §5.3: wrong guess costs replacement cost of wrong part
    if (wrongGuesses && wrongGuesses.length > 0) {
      const penalty = wrongGuesses.reduce((s,id) => s+((allParts.find(p => p.id===id)||{}).replaceCost||50), 0);
      setState(s => ({...s,currency:{...s.currency,yen:Math.max(0,s.currency.yen-penalty)}}));
      addLog("- ¥"+penalty+" (wrong parts replaced for nothing)");
    }
    if (correct) { const eb=vehicle.parts["electrical_bundle"]; if(eb&&(eb.condition||0)<0.70){const nc=Math.min(0.90,(eb.condition||0.1)+0.25);updatePart("electrical_bundle",{condition:parseFloat(nc.toFixed(2))});addLog("✓ Electrical → "+Math.round(nc*100)+"%");} }
    setActiveDiag(null);
  };

  // Donor part usage (spec §3)
  const handleUseDonor = (pd) => {

            <button key={id} onClick={() => setTab(id)} style={{ ...btnBase, flex: 1, padding: "9px", fontSize: 12, fontWeight: 600, background: tab===id?T.accent:"transparent", color: tab===id?"#fff":T.textMuted, borderRadius: 6 }}>{lbl}</button>
          ))}
        </div>

        {/* Career tab */}
        {tab === "career" && (
          <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "20px 24px" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: T.textMuted, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 14 }}>Select Trainee ({unlocked.length}/{UMA_ROSTER.length} unlocked)</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 8 }}>
              {UMA_ROSTER.map(g => {
                const owned = unlocked.includes(g.id);
                return (
                  <button key={g.id} onClick={() => owned && startCareer(g.id)} disabled={!owned} style={{
                    ...btnBase, padding: "14px 12px", background: owned ? T.bg : T.bgElevated, border: "1px solid " + (owned ? T.border : T.border),
                    borderRadius: T.radius, textAlign: "left", borderLeft: "3px solid " + (owned ? g.accent : T.textMuted + "40"),
                    opacity: owned ? 1 : 0.4, cursor: owned ? "pointer" : "not-allowed",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: owned ? T.text : T.textMuted }}>{g.name}</span>
                      <span style={{ fontSize: 9, color: g.accent }}>{"★".repeat(g.star)}</span>
                    </div>
                    <div style={{ fontSize: 10, color: T.textMuted }}>{DIST_LABELS[g.dist]} · {STYLE_LABELS[g.style]} · +{g.bonus}</div>
                    {!owned && <div style={{ fontSize: 10, color: T.danger, marginTop: 2 }}>🔒 Scout to unlock</div>}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Gacha tab */}
        {tab === "gacha" && (
          <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "24px", textAlign: "center" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: T.text, marginBottom: 4 }}>🎰 Pretty Derby Scout</div>
            <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 16 }}>Spend gems to scout new trainees! · 💎 {GACHA_COST} per pull</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: "#fbbf24", marginBottom: 16 }}>💎 {pd.gems || 0}</div>

            {/* CSGO Case Opening */}
            {gachaSpinning && gachaResult && !gachaResult.dupe && (
              <GachaCaseOpening winner={gachaResult} onDone={() => setGachaSpinning(false)} />
            )}
            {gachaSpinning && gachaResult && gachaResult.dupe && (
              <div style={{ marginBottom: 16, padding: "20px", border: "1px solid " + T.border, borderRadius: T.radiusLg }}>
                <div style={{ fontSize: 22 }}>💎</div>
                <div style={{ fontSize: 12, color: T.textMuted, marginTop: 8 }}>All trainees scouted — returning gems...</div>
              </div>
            )}

            {/* Result reveal (after animation) */}
            {!gachaSpinning && gachaResult && !gachaResult.dupe && (
              <div style={{ background: gachaResult.accent + "15", border: "2px solid " + gachaResult.accent, borderRadius: T.radiusXl, padding: "24px", marginBottom: 16, animation: "gacha-flash 0.5s cubic-bezier(0.34,1.56,0.64,1)" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#fbbf24", letterSpacing: "1px", textTransform: "uppercase", marginBottom: 12 }}>✨ NEW TRAINEE SCOUTED ✨</div>
                {UMA_ASCII[gachaResult.id] && (
                  <pre style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, lineHeight: 1.5, color: gachaResult.accent, margin: "0 auto 14px", textAlign: "center", display: "inline-block", background: gachaResult.accent+"10", padding: "12px 20px", borderRadius: 10, border: "1px solid " + gachaResult.accent+"30", animation: "statPop 0.5s ease" }}>
                    {UMA_ASCII[gachaResult.id].join("\n")}
                  </pre>
                )}
                <div style={{ fontSize: 20, fontWeight: 800, color: T.text, marginBottom: 4 }}>{gachaResult.name}</div>
                <div style={{ fontSize: 11, color: gachaResult.accent, marginBottom: 4 }}>{"★".repeat(gachaResult.star)} · {DIST_LABELS[gachaResult.dist]} · {STYLE_LABELS[gachaResult.style]}</div>
                <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 14 }}>Bonus stat: {STAT_ICONS[gachaResult.bonus]} {gachaResult.bonus}</div>
                <button onClick={() => setGachaResult(null)} style={{ ...btnBase, padding: "8px 24px", background: T.accent, color: "#fff", fontSize: 13, fontWeight: 700 }}>Start Training! 🏇</button>
              </div>
            )}
            {!gachaSpinning && gachaResult && gachaResult.dupe && (
              <div style={{ background: T.accentBg, border: "1px solid " + T.accent + "30", borderRadius: T.radiusLg, padding: "20px", marginBottom: 16, animation: "gacha-flash 0.4s ease" }}>
                <div style={{ fontSize: 24, marginBottom: 8 }}>💎</div>
                <div style={{ fontSize: 13, color: T.accent, fontWeight: 600 }}>All trainees already scouted!</div>
                <div style={{ fontSize: 11, color: T.textMuted, marginTop: 4, marginBottom: 12 }}>+50 gems returned as compensation</div>
                <button onClick={() => setGachaResult(null)} style={{ ...btnBase, padding: "6px 16px", background: T.bgElevated, color: T.textSub, fontSize: 11 }}>OK</button>
              </div>
            )}

            {!gachaResult && (
              <button onClick={doGacha} disabled={(pd.gems||0) < GACHA_COST || gachaSpinning} style={{
                ...btnBase, padding: "16px 40px", fontSize: 16, fontWeight: 800,
                background: ((pd.gems||0) >= GACHA_COST && !gachaSpinning) ? "linear-gradient(135deg, #fbbf24, #f97316)" : T.bgElevated,
                color: ((pd.gems||0) >= GACHA_COST && !gachaSpinning) ? "#fff" : T.textMuted,
                cursor: ((pd.gems||0) >= GACHA_COST && !gachaSpinning) ? "pointer" : "not-allowed",
                boxShadow: ((pd.gems||0) >= GACHA_COST && !gachaSpinning) ? "0 6px 24px #fbbf2440" : "none",
              }}>Scout! (💎 {GACHA_COST})</button>
            )}

            <div style={{ marginTop: 20, fontSize: 10, color: T.textMuted, textAlign: "left" }}>
              <div style={{ fontWeight: 700, marginBottom: 6 }}>Unlocked: {unlocked.length}/{UMA_ROSTER.length}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {UMA_ROSTER.map(g => (
                  <span key={g.id} style={{ padding: "2px 8px", borderRadius: 10, fontSize: 10, background: unlocked.includes(g.id) ? g.accent+"20" : T.bgElevated, color: unlocked.includes(g.id) ? g.accent : T.textMuted, border: "1px solid " + (unlocked.includes(g.id) ? g.accent+"40" : T.border) }}>{unlocked.includes(g.id) ? g.name : "???"}</span>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Veterans tab */}
        {tab === "veterans" && (
          <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "20px 24px" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: T.textMuted, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 14 }}>Veteran Hall</div>
            {pd.veterans.length === 0 ? <div style={{ fontSize: 12, color: T.textMuted, fontStyle: "italic" }}>No veterans yet — complete a career!</div>
              : pd.veterans.slice().reverse().map((v, i) => {
                const g = getGrade(v.total); const gd = UMA_ROSTER.find(r => r.id === v.girlId);
                return (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", background: T.bg, borderRadius: T.radius, marginBottom: 6, borderLeft: "3px solid " + (v.failed ? T.danger : (gd?.accent || T.accent)), opacity: v.failed ? 0.5 : 1 }}>
                    <div style={{ fontSize: 22, fontWeight: 800, color: g.color, fontFamily: "'JetBrains Mono'", minWidth: 36, textAlign: "center" }}>{g.letter}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{v.girlName} {v.failed ? "(Failed)" : ""}</div>
                      <div style={{ display: "flex", gap: 8, marginTop: 2 }}>
                        {STAT_KEYS.map(k => <span key={k} style={{ fontSize: 10, color: STAT_COLORS[k], fontFamily: "'JetBrains Mono'", fontWeight: 600 }}>{STAT_ICONS[k]}{v.stats[k]}</span>)}
                        <span style={{ fontSize: 10, color: T.textMuted, fontFamily: "'JetBrains Mono'" }}>= {v.total}pt</span>
                      </div>
                    </div>
                    <div style={{ fontSize: 10, color: T.textMuted }}>{v.date}</div>
                  </div>
                );
              })
            }
          </div>
        )}
      </div>
    );
  }

  // ── RENDER: Career In Progress ──
  const turnPct = Math.round((career.turn / TOTAL_TURNS) * 100);
  const gradeNow = getGrade(totalStats);

  return (
    <div style={{ maxWidth: 820, margin: "0 auto", animation: "fadeUp 0.3s ease" }}>
      {/* Top bar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: girl.accent }} />
          <span style={{ fontSize: 17, fontWeight: 800, color: T.text }}>{girl.name}</span>
          <span style={{ fontSize: 9, color: girl.accent }}>{"★".repeat(girl.star)}</span>
          <span style={{ fontSize: 20, fontWeight: 800, color: gradeNow.color, fontFamily: "'JetBrains Mono'" }}>{gradeNow.letter}</span>
          <span style={{ fontSize: 11, color: T.textMuted, fontFamily: "'JetBrains Mono'" }}>{totalStats}pt</span>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <span style={{ fontSize: 11, color: T.textMuted }}>Turn {career.turn + 1}/{TOTAL_TURNS}</span>
          <div style={{ width: 80, height: 6, background: T.border, borderRadius: 3, overflow: "hidden" }}>
            <div style={{ height: "100%", width: turnPct + "%", background: T.accent, borderRadius: 3 }} />
          </div>
          <button onClick={abandonCareer} style={{ ...btnBase, background: T.danger+"15", color: T.danger, padding: "4px 10px", fontSize: 10 }}>Retire</button>
        </div>
      </div>

      {/* Race animation overlay */}
      {racing && <RaceAnimation girl={girl} score={racing.score} threshold={racing.threshold} onFinish={onRaceFinish} />}

      {!racing && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 250px", gap: 14 }}>
          {/* Left column */}
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {/* Stats */}
            <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "14px 18px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: T.textMuted, letterSpacing: "0.8px", textTransform: "uppercase" }}>Stats</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: gradeNow.color, fontFamily: "'JetBrains Mono'" }}>{totalStats}pt</span>
              </div>
              {STAT_KEYS.map(k => (
                <div key={k} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>
                  <span style={{ fontSize: 11, width: 16, textAlign: "center" }}>{STAT_ICONS[k]}</span>
                  <span style={{ fontSize: 10, color: T.textSub, minWidth: 48, textTransform: "capitalize" }}>{k}</span>
                  <div style={{ flex: 1, height: 7, background: T.border, borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: Math.min(100, career.stats[k]/3)+"%", background: STAT_COLORS[k], borderRadius: 4, transition: "width 0.3s" }} />
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, color: STAT_COLORS[k], fontFamily: "'JetBrains Mono'", minWidth: 28, textAlign: "right" }}>{career.stats[k]}</span>
                </div>
              ))}
            </div>

            {/* Actions */}
            {curRace ? (
              <div style={{ background: T.bgCard, border: "2px solid " + T.warning, borderRadius: T.radiusLg, padding: "18px" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: T.warning, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 6 }}>🏁 {curRace.name} ({curRace.grade})</div>
                <div style={{ fontSize: 12, color: T.text, marginBottom: 2 }}>Target score: ~{curRace.threshold}pt</div>
                <div style={{ fontSize: 11, color: totalStats * 7 / 5 >= curRace.threshold ? T.success : T.warning, marginBottom: 12 }}>
                  {totalStats * 7 / 5 >= curRace.threshold ? "✓ Looking strong! You should win this." : totalStats * 7 / 5 >= curRace.threshold * 0.85 ? "⚡ Could go either way — depends on race RNG!" : "⚠ Underprepared — tough but possible!"}
                </div>
                <button onClick={doRace} style={{ ...btnBase, width: "100%", padding: "14px", fontSize: 14, fontWeight: 700, background: "linear-gradient(135deg, "+T.warning+", "+T.danger+")", color: "#fff", borderRadius: T.radius }}>🏇 Race!</button>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {/* Optional race banner */}
                {(() => {
                  const optRace = RACE_SCHEDULE.find(r => r.optional && r.turn === career.turn && !(career.optRacesRun || []).includes(r.turn));
                  if (!optRace) return null;
                  const strength = totalStats * 7 / 5;
                  const hint = strength >= optRace.threshold ? "✓ Good odds!" : strength >= optRace.threshold * 0.8 ? "⚡ 50/50" : "⚠ Risky";
                  return (
                    <div style={{ background: T.bgCard, border: "1px solid " + T.accent + "50", borderRadius: T.radiusLg, padding: "12px 14px" }}>
                      <div style={{ fontSize: 9, fontWeight: 700, color: T.accent, textTransform: "uppercase", marginBottom: 4 }}>⭐ Optional Race Available</div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: T.text, marginBottom: 2 }}>{optRace.name} ({optRace.grade})</div>
                      <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 8 }}>~{optRace.threshold}pt · Win: +{optRace.gemReward}💎 + stat boosts · {hint}</div>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => doOptionalRace(optRace)} style={{ ...btnBase, flex: 1, padding: "8px", fontSize: 11, fontWeight: 700, background: T.accent, color: "#fff" }}>🏇 Enter Race!</button>
                        <button onClick={() => setPd(p => ({ ...p, currentCareer: { ...p.currentCareer, optRacesRun: [...(p.currentCareer.optRacesRun||[]), optRace.turn] } }))} style={{ ...btnBase, padding: "8px 12px", fontSize: 11, background: T.bgElevated, color: T.textMuted }}>Skip</button>
                      </div>
                    </div>
                  );
                })()}
                <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "14px 18px" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: T.textMuted, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 8 }}>Choose Action</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 6 }}>
                  {STAT_KEYS.map(k => {
                    const expectedBase = k === girl.bonus ? 19 : 14;
                    const skillMult = ( career.skills || [] ).includes("natural_gift") ? 1.15 : 1.0;
                    const dimMult = career.stats[k] >= 140 ? 0.60 : career.stats[k] >= 100 ? 0.80 : 1.0;
                    const expectedGain = Math.round(expectedBase * (MOOD_MULT[career.mood] || 1) * dimMult * skillMult);
                    const isBonus = k === girl.bonus;
                    return (
                      <button key={k} onClick={() => doTrain(k)} disabled={career.energy < 15} style={{
                        ...btnBase, padding: "10px 6px", fontSize: 11, fontWeight: 600,
                        background: career.energy >= 15 ? STAT_COLORS[k]+"12" : T.bgElevated,
                        color: career.energy >= 15 ? STAT_COLORS[k] : T.textMuted,
                        border: "1px solid " + (career.energy >= 15 ? STAT_COLORS[k]+"35" : T.border),
                        display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                        cursor: career.energy >= 15 ? "pointer" : "not-allowed",
                        position: "relative",
                      }}>
                        {isBonus && <div style={{ position: "absolute", top: 3, right: 3, fontSize: 7, color: "#fbbf24", fontWeight: 800 }}>★</div>}
                        <span style={{ fontSize: 15 }}>{STAT_ICONS[k]}</span>
                        <span style={{ textTransform: "capitalize" }}>{k}</span>
                        <span style={{ fontSize: 9, opacity: 0.8, fontFamily: "'JetBrains Mono'" }}>+~{expectedGain}</span>
                        <span style={{ fontSize: 8, color: T.danger, opacity: 0.7 }}>-15~23⚡</span>
                      </button>
                    );
                  })}
                  <button onClick={doRest} style={{ ...btnBase, padding: "10px 6px", fontSize: 11, fontWeight: 600, background: T.success+"12", color: T.success, border: "1px solid "+T.success+"35", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                    <span style={{ fontSize: 15 }}>💤</span><span>Rest</span>
                    <span style={{ fontSize: 9, opacity: 0.8, fontFamily: "'JetBrains Mono'" }}>+30~55⚡</span>
                    <span style={{ fontSize: 8, opacity: 0 }}>—</span>
                  </button>
                  <button onClick={doOuting} style={{ ...btnBase, padding: "10px 6px", fontSize: 11, fontWeight: 600, background: "#ff69b412", color: "#ff69b4", border: "1px solid #ff69b435", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                    <span style={{ fontSize: 15 }}>🎀</span><span>Outing</span>
                    <span style={{ fontSize: 9, opacity: 0.8, fontFamily: "'JetBrains Mono'" }}>Mood↑</span>
                    <span style={{ fontSize: 8, opacity: 0 }}>—</span>
                  </button>
                </div>
                {career.energy < 15 && <div style={{ fontSize: 10, color: T.danger, textAlign: "center" }}>⚠ Not enough energy to train — Rest or Outing!</div>}
                </div>
              </div>
            )}

            {/* Dialogue box */}
            {dialogue && (
              <div style={{ background: girl.accent + "08", border: "1px solid " + girl.accent + "25", borderRadius: T.radiusLg, padding: "14px 18px", fontSize: 13, color: T.text, whiteSpace: "pre-line", lineHeight: 1.6 }}>
                {dialogue}
              </div>
            )}
          </div>

          {/* Right sidebar */}
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {/* Girl card with ASCII art */}
            <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "12px 14px", borderLeft: "3px solid " + girl.accent }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                <div style={{ width: 30, height: 30, borderRadius: "50%", background: girl.color+"30", border: "2px solid "+girl.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 800, color: girl.accent, flexShrink: 0 }}>{girl.name.split(" ").map(w=>w[0]).join("")}</div>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: T.text }}>{girl.name}</div>
                  <div style={{ fontSize: 9, color: T.textMuted }}>{STYLE_LABELS[girl.style]} · {DIST_LABELS[girl.dist]}</div>
                </div>
              </div>
              {UMA_ASCII[girl.id] && (
                <pre style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, lineHeight: 1.5, color: girl.accent, margin: 0, textAlign: "center", background: girl.accent+"08", padding: "6px 4px", borderRadius: 6 }}>
                  {UMA_ASCII[girl.id].join("\n")}
                </pre>
              )}
            </div>

            {/* Energy + Mood */}
            <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "12px 14px" }}>
              <div style={{ marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <span style={{ fontSize: 9, fontWeight: 700, color: T.textMuted, textTransform: "uppercase" }}>Energy</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: career.energy < 25 ? T.danger : career.energy < 50 ? T.warning : T.success, fontFamily: "'JetBrains Mono'" }}>{career.energy}%</span>
                </div>
                <div style={{ height: 7, background: T.border, borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: career.energy+"%", background: career.energy < 25 ? T.danger : career.energy < 50 ? T.warning : T.success, borderRadius: 4 }} />
                </div>
              </div>
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <span style={{ fontSize: 9, fontWeight: 700, color: T.textMuted, textTransform: "uppercase" }}>Mood</span>
                  <span style={{ fontSize: 11, fontWeight: 600, color: MOOD_COLORS[career.mood] }}>{MOOD_EMOJI[career.mood]} {MOOD_LABELS[career.mood]}</span>
                </div>
                <div style={{ height: 7, background: T.border, borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: ((MOOD_LEVELS.indexOf(career.mood)+1)/5*100)+"%", background: MOOD_COLORS[career.mood], borderRadius: 4 }} />
                </div>
                <div style={{ fontSize: 9, color: T.textMuted, marginTop: 3 }}>Training ×{MOOD_MULT[career.mood]}</div>
              </div>
            </div>

            {/* Next race */}
            {nextRace && !curRace && (
              <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "12px 14px" }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: T.textMuted, textTransform: "uppercase", marginBottom: 4 }}>Next Race</div>
                <div style={{ fontSize: 12, fontWeight: 600, color: T.warning }}>{nextRace.name}</div>
                <div style={{ fontSize: 10, color: T.textMuted }}>in {nextRace.turn - career.turn} turn{nextRace.turn - career.turn > 1 ? "s" : ""} · ~{nextRace.threshold}pt</div>
              </div>
            )}

            {/* Race history */}
            {career.raceResults.length > 0 && (
              <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "12px 14px" }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: T.textMuted, textTransform: "uppercase", marginBottom: 6 }}>Races</div>
                {career.raceResults.map((r,i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 10 }}>
                    <span style={{ color: T.text }}>{r.name}{r.optional ? " ★" : ""}</span>
                    <span style={{ fontWeight: 700, color: r.won ? T.success : T.danger }}>{r.won ? "WIN" : "LOSE"}</span>
                  </div>
                ))}
              </div>
            )}

// ─── MEMBER PIES ───
function MemberPies({ allTasks, team, stats }) {
  const memberData = team.map(m => {
    const myTasks = allTasks.filter(t => t.assignee === m.id);
    return {
      ...m,
      logged: myTasks.reduce((s, t) => s + (t.logged || 0), 0),
      done: myTasks.filter(t => t.status === "complete").length,
    };
  }).filter(m => m.logged > 0 || m.done > 0);

  const totalLogged = memberData.reduce((s, m) => s + m.logged, 0);
  const totalDone = memberData.reduce((s, m) => s + m.done, 0);

  const hourSlices = memberData.filter(m => m.logged > 0).map(m => ({ name: m.name, initials: m.initials, color: m.color, value: m.logged }));
  const taskSlices = memberData.filter(m => m.done > 0).map(m => ({ name: m.name, initials: m.initials, color: m.color, value: m.done }));

  if (memberData.length === 0) return null;
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16, animation: "fadeUp 0.3s ease 0.28s both" }}>
      <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "18px 20px" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: T.textMuted, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 14 }}>Hours Logged</div>
        <PieChart slices={hourSlices} total={totalLogged} label="total" unit="h" size={120} />
      </div>
      <div style={{ background: T.bgCard, border: "1px solid " + T.border, borderRadius: T.radiusLg, padding: "18px 20px" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: T.textMuted, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 14 }}>Tasks Completed</div>
        <PieChart slices={taskSlices} total={totalDone} label="done" unit="" size={120} />
      </div>
    </div>
  );
}

// ─── DASHBOARD ───
function DashView({ sprint, stats, team, mMap, tasks, allTasks, cycle, del, onLog, onEdit, onReorder }) {
  const over = stats.logged > stats.estimated && stats.estimated > 0;
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);

  const handleDragStart = (e, idx) => {
    setDragIdx(idx);
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", idx);
  };
  const handleDragOver = (e, idx) => { e.preventDefault(); setDragOverIdx(idx); };
  const handleDrop = (e, idx) => {
    e.preventDefault();
    if (dragIdx !== null && dragIdx !== idx) {
      const fromId = tasks[dragIdx]?.id;
      const toId = tasks[idx]?.id;
      const fromReal = allTasks.findIndex(t => t.id === fromId);
      const toReal = allTasks.findIndex(t => t.id === toId);
      if (fromReal >= 0 && toReal >= 0) onReorder(fromReal, toReal);
    }
    setDragIdx(null); setDragOverIdx(null);
  };
  const handleDragEnd = () => { setDragIdx(null); setDragOverIdx(null); };

  const taskPct = stats.tasks > 0 ? Math.round(stats.doneTasks / stats.tasks * 100) : 0;

    { label: "Tasks Done",  value: stats.doneTasks + "/" + stats.tasks, sub: taskPct + "% complete",           color: T.accent,   ring: { v: stats.doneTasks, m: stats.tasks } },
    { label: "In Progress", value: String(stats.inProgressTasks),       sub: "active right now",               color: T.warning,  ring: { v: stats.inProgressTasks, m: stats.tasks } },
    { label: "Remaining",   value: String(stats.tasks - stats.doneTasks - stats.inProgressTasks), sub: "not started", color: T.textSub, ring: null },
    { label: "Hours Est.",  value: stats.estimated + "h",               sub: stats.logged + "h logged",        color: "#4e9fff",  ring: { v: stats.logged, m: stats.estimated } },
    { label: "Time Budget", value: over ? "Over" : (stats.estimated > 0 ? Math.round((1 - stats.logged / stats.estimated) * 100) + "%" : "–") + " left", sub: over ? stats.logged - stats.estimated + "h over estimate" : stats.logged + "h of " + stats.estimated + "h used", color: over ? T.danger : T.success, ring: null },
  ];

  return (
