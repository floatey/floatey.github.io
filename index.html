const fmtFull = (d) => { if (!d) return ""; const dt = new Date(d + "T00:00:00"); return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); };

const fmtDateTime = (iso) => { if (!iso) return ""; const [date, time] = iso.split("T"); const dt = new Date(date + "T00:00:00"); const d = dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }); return time ? d + " at " + time : d; };

  const circ = 2 * Math.PI * r;

    <svg width={size} height={size} style={{ transform: "rotate(-90deg)", flexShrink: 0 }}>

// ─── PIE CHART ───
function PieChart({ slices, size = 130, label, total, unit = "" }) {
  const r = size / 2;
  const cx = r, cy = r;
  const innerR = r * 0.56;
  let cursor = -Math.PI / 2;
  const paths = slices.filter(s => s.value > 0).map(s => {
    const angle = (s.value / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(cursor);
    const y1 = cy + r * Math.sin(cursor);
    cursor += angle;
    const x2 = cx + r * Math.cos(cursor);
    const y2 = cy + r * Math.sin(cursor);
    const large = angle > Math.PI ? 1 : 0;
    return { ...s, d: `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`, angle };
  });

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 20, flex: 1 }}>
      <div style={{ position: "relative", flexShrink: 0 }}>
        <svg width={size} height={size}>
          {paths.length === 0
            ? <circle cx={cx} cy={cy} r={r} fill={T.border} />
            : paths.map((p, i) => <path key={i} d={p.d} fill={p.color} opacity={0.9} />)

        </svg>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 7, flex: 1 }}>
        {slices.map((s, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: s.color, flexShrink: 0 }} />

          </div>
        ))}
      </div>
    </div>
  );
}

// ─── SMOOTH SVG PATH  (Catmull-Rom → cubic Bézier, tension 0–1) ───
// tension = 0   → straight segments (no smoothing)
// tension = 0.4 → smooth but hugs the data (default)
// tension = 1   → very loose / over-smoothed
const smoothPath = (pts, tension = 0.4) => {
  if (pts.length < 2) return "";
  if (pts.length === 2) return `M ${pts[0].x},${pts[0].y} L ${pts[1].x},${pts[1].y}`;
  const n = pts.length;
  let d = `M ${pts[0].x},${pts[0].y}`;
  for (let i = 0; i < n - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[Math.min(n - 1, i + 2)];
    // Catmull-Rom tangents → cubic Bézier control handles
    const cp1x = p1.x + (p2.x - p0.x) * tension / 2;
    const cp1y = p1.y + (p2.y - p0.y) * tension / 2;
    const cp2x = p2.x - (p3.x - p1.x) * tension / 2;
    const cp2y = p2.y - (p3.y - p1.y) * tension / 2;
    d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
  }
  return d;
};

function getZoneTime(tz) {
  const now = new Date();
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: tz, hour: "numeric", minute: "2-digit", second: "2-digit",
    hour12: true, weekday: "short",
  }).formatToParts(now);
  const get = (t) => parts.find(p => p.type === t)?.value || "";
  const rawHour = get("hour");
  const min  = get("minute");
  const sec  = get("second");
  const ampm = get("dayperiod") || get("dayPeriod") || "";
  const weekday = get("weekday");
  // derive offset label
  const fmt = new Intl.DateTimeFormat("en-US", { timeZone: tz, timeZoneName: "short" });
  const tzName = fmt.formatToParts(now).find(p => p.type === "timeZoneName")?.value || tz;
  return { time: rawHour + ":" + min, sec, ampm: ampm.toLowerCase(), weekday, tzName };
}

        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
            <span style={{ fontSize: 15, fontWeight: 700, color: T.text, fontFamily: "'JetBrains Mono'", letterSpacing: "-0.5px" }}>
              {primary.time}
            </span>
            <span style={{ fontSize: 10, color: T.textMuted, fontFamily: "'JetBrains Mono'" }}>
              {primary.sec}
            </span>
            <span style={{ fontSize: 10, color: T.textMuted, textTransform: "uppercase" }}>
              {primary.ampm}
            </span>
          </div>
          <div style={{ fontSize: 9, color: T.textMuted, letterSpacing: "0.5px", textTransform: "uppercase", marginTop: 1 }}>
            {primary.weekday} · {primary.tzName}
          </div>
        </div>
      </div>

      {/* Hover panel — all zones */}
      {hover && (
        <div style={{
          position: "absolute", bottom: "calc(100% + 6px)", left: 10, right: 10,
          background: T.bgElevated, border: "1px solid " + T.borderLight,
          borderRadius: T.radiusLg, padding: "10px 12px",
          boxShadow: "0 16px 48px #000000b0, 0 0 0 1px " + T.border,
          animation: "fadeUp 0.12s ease",
          zIndex: 200,
        }}>
          <div style={{ fontSize: 9, fontWeight: 700, color: T.textMuted, letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: 8 }}>Team Timezones</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
            {TZ_ZONES.map((z, i) => {
              const info = getZoneTime(z.tz);
              const isEst = i === 0;
              const isCst = i === 1;
              return (
                <div key={z.label} style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "5px 8px", borderRadius: 6,
                  background: isEst ? T.accent + "12" : isCst ? T.accent + "07" : "transparent",
                  border: isEst ? "1px solid " + T.accent + "25" : "1px solid transparent",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                    <span style={{
                      fontSize: 9, fontWeight: 700, letterSpacing: "0.5px",
                      color: isEst ? T.accent : isCst ? T.textSub : T.textMuted,
                      minWidth: 28,
                    }}>{z.label}</span>
                    <span style={{ fontSize: 9, color: T.textMuted }}>{info.tzName}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 3 }}>
                    <span style={{
                      fontSize: 13, fontWeight: isEst ? 700 : 500,
                      color: isEst ? T.text : isCst ? T.textSub : T.textMuted,
                      fontFamily: "'JetBrains Mono'",
                    }}>{info.time}</span>
                    <span style={{ fontSize: 9, color: T.textMuted, fontFamily: "'JetBrains Mono'" }}>{info.sec}</span>
                    <span style={{ fontSize: 9, color: T.textMuted, textTransform: "uppercase" }}>{info.ampm}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── GAME SOUND ENGINE (Web Audio API synthesized) ──
const GameAudio = {
  ctx: null, enabled: true,
  init() { if (!this.ctx) { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } },
  play(freq, dur, type = "square", vol = 0.15) {
    if (!this.enabled || !this.ctx) return;
    try {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(); o.stop(this.ctx.currentTime + dur);
    } catch(e) {}
  },
  click()    { this.play(800 + Math.random() * 400, 0.06, "square", 0.08); },
  critical() { this.play(1200, 0.04, "square", 0.12); this.play(1600, 0.08, "sine", 0.1); },
  hazard()   { this.play(200, 0.3, "sawtooth", 0.1); },
  complete() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => this.play(f, 0.25, "sine", 0.12), i * 120)); },
  error()    { this.play(200, 0.15, "square", 0.1); this.play(150, 0.15, "square", 0.1); },
  uiClick()  { this.play(600, 0.03, "sine", 0.06); },
  engineStart() {
    const rumble = () => { for (let i = 0; i < 30; i++) setTimeout(() => this.play(80 + Math.random() * 60, 0.12, "sawtooth", 0.06 + i * 0.003), i * 80); };
    rumble();
    setTimeout(() => { [220, 330, 440, 550].forEach((f, i) => setTimeout(() => this.play(f, 0.4, "sine", 0.08), i * 200)); }, 2400);
  },
};

// ── GAME HELPERS ──
const getConditionInfo = (c) => {
  if (c === null || c === undefined) return { label: "UNKNOWN", color: "#6b7280" };
  for (const [lo, hi, label, color] of CONDITION_LABELS) {
    if (c >= lo && c <= hi) return { label, color };
  }
  return { label: "???", color: "#6b7280" };
};

const generateArrivalCondition = (rarity) => {
  const ranges = { 3: [0.20, 0.45], 4: [0.10, 0.35], 5: [0.05, 0.25] };
  const [min, max] = ranges[rarity] || [0.15, 0.40];
  let condition = min + Math.random() * (max - min);
  const systemShift = (Math.random() - 0.5) * 0.30;
  condition = Math.max(0.01, Math.min(0.60, condition + systemShift));
  if (Math.random() < 0.08) condition = 0.70 + Math.random() * 0.25;
  return parseFloat(condition.toFixed(2));
};

const getAllParts = (partTree) => {
  const parts = [];
  for (const sys of partTree.systems) {
    if (sys.type === "detailed" && sys.subsystems) {
      for (const sub of sys.subsystems) {
        for (const p of sub.parts) parts.push({ ...p, systemId: sys.id, subsystemId: sub.id });
      }
    } else if (sys.type === "bundle") {
      parts.push({ id: sys.id + "_bundle", name: sys.name, repairType: sys.repairType || "wrench", difficulty: sys.difficulty, canRepair: true, replaceCost: sys.bundleCost, sourceRarity: "common", prerequisites: [], hiddenReveal: null, flavorText: sys.flavorText, systemId: sys.id, subsystemId: null, isBundle: true });
    }
  }
  return parts;
};

const initializeVehicleParts = (partTree) => {
  const allParts = getAllParts(partTree);
  const instanceParts = {};
  for (const p of allParts) {
    const isHidden = allParts.some(op => op.hiddenReveal && op.hiddenReveal.targetPartId === p.id);
    instanceParts[p.id] = {
      condition: isHidden ? null : generateArrivalCondition(partTree.rarity),
      installed: true, revealed: !isHidden, repairProgress: 0,
    };
  }
  return instanceParts;
};

const getSystemCompletion = (partTree, vehicleParts) => {
  const results = {};
  for (const sys of partTree.systems) {
    let parts = [];
    if (sys.type === "detailed" && sys.subsystems) {
      for (const sub of sys.subsystems) {
        for (const p of sub.parts) parts.push(p.id);
      }
    } else {
      parts.push(sys.id + "_bundle");
    }
    const revealed = parts.filter(id => vehicleParts[id]?.revealed);
    const done = revealed.filter(id => (vehicleParts[id]?.condition || 0) >= 0.70);
    const total = revealed.length || 1;
    results[sys.id] = { done: done.length, total, pct: Math.round((done.length / total) * 100) };
  }
  return results;
};

const CRITICAL_SYSTEMS = ["engine", "fuel", "cooling", "exhaust", "electrical", "drivetrain"];
const isReadyForFirstStart = (partTree, vehicleParts) => {
  const comp = getSystemCompletion(partTree, vehicleParts);
  return CRITICAL_SYSTEMS.every(s => comp[s] && comp[s].pct >= 100);
};

// ── GAME FIREBASE SYNC ──
const syncGameToFirebase = async (profileId, state) => {
  if (!window._firebaseReady || !window._gameDoc) return;
  try {
    await window._setDoc(window._gameDoc(profileId), { payload: state, lastModified: Date.now() });
    return true;
  } catch (e) { console.error("Game sync failed:", e); return false; }
};
const loadGameFromFirebase = async (profileId) => {
  if (!window._firebaseReady || !window._gameDoc || !window._getDoc) return null;
  try {
    const snap = await window._getDoc(window._gameDoc(profileId));
    if (snap.exists()) return snap.data().payload;
    return null;
  } catch (e) { console.error("Game load failed:", e); return null; }
};
const postToFeed = async (entry) => {
  if (!window._firebaseReady || !window._gameFeedDoc) return;
  try {
    const snap = await window._getDoc(window._gameFeedDoc);
    let entries = snap.exists() ? (snap.data().entries || []) : [];
    entries.unshift({ ...entry, when: Date.now() });
    if (entries.length > 50) entries = entries.slice(0, 50);
    await window._setDoc(window._gameFeedDoc, { entries });
  } catch (e) { console.error("Feed post failed:", e); }
};
const loadFeed = async () => {
  if (!window._firebaseReady || !window._gameFeedDoc || !window._getDoc) return [];
  try {
    const snap = await window._getDoc(window._gameFeedDoc);
    return snap.exists() ? (snap.data().entries || []) : [];
  } catch { return []; }
};

// ── WRENCH WORK MECHANIC ──
function WrenchMechanic({ part, difficulty, skillLevel, onComplete, onLog }) {
  const [progress, setProgress] = useState(0);
  const [combo, setCombo] = useState(1.0);
  const [clickCount, setClickCount] = useState(0);
  const [hazardActive, setHazardActive] = useState(false);
  const [hazardFailed, setHazardFailed] = useState(false);
  const [lastClickTime, setLastClickTime] = useState(0);
  const [momentumLevel, setMomentumLevel] = useState(0);
  const [flavorIdx, setFlavorIdx] = useState(0);
  const [criticalFlash, setCriticalFlash] = useState(false);
  const [done, setDone] = useState(false);
  const nextHazardRef = useRef(15 + Math.floor(Math.random() * 16));
  const nextCriticalRef = useRef(8 + Math.floor(Math.random() * 28));
  const comboRef = useRef(1.0);

  const idealTempo = 300 - (difficulty * 120);
  const tempoWindow = 100 + (skillLevel * 8);
  const baseClickValue = (0.8 + skillLevel * 0.2) / (20 + difficulty * 40);

  const handleClick = useCallback(() => {
    if (done) return;
    GameAudio.init();

    if (hazardActive) {
      setHazardFailed(true);
      setHazardActive(false);
      setCombo(1.0); comboRef.current = 1.0;
      setMomentumLevel(0);
      setProgress(p => Math.max(0, p - 0.05));
      GameAudio.hazard();
      onLog && onLog("⚠ Clicked through a stuck bolt — lost momentum!");
      setTimeout(() => setHazardFailed(false), 600);
      return;
    }

    const now = performance.now();
    const dt = now - lastClickTime;
    setLastClickTime(now);

    let newCombo = comboRef.current;
    if (lastClickTime > 0 && Math.abs(dt - idealTempo) < tempoWindow) {
      newCombo = Math.min(3.0, newCombo + 0.25);
      setMomentumLevel(l => Math.min(5, l + 1));
    } else if (lastClickTime > 0) {
      newCombo = 1.0;
      setMomentumLevel(0);
    }
    setCombo(newCombo); comboRef.current = newCombo;

    const count = clickCount + 1;
    setClickCount(count);
    GameAudio.click();

    let gain = baseClickValue * newCombo;

    if (count >= nextCriticalRef.current) {
      gain *= 4;
      setCriticalFlash(true);
      GameAudio.critical();
      onLog && onLog("✦ CRACK — it broke free! Big progress.");
      setTimeout(() => setCriticalFlash(false), 400);
      nextCriticalRef.current = count + 8 + Math.floor(Math.random() * 28);
    }

    const newProgress = Math.min(1, progress + gain);
    setProgress(newProgress);

    if (newProgress >= 1 && !done) {
      setDone(true);
      GameAudio.complete();
      onLog && onLog("✓ " + part.name + " — done!");
      setTimeout(() => onComplete && onComplete(), 500);
      return;
    }

    if (count >= nextHazardRef.current && !done && newProgress < 0.95) {
      setHazardActive(true);
      nextHazardRef.current = count + 15 + Math.floor(Math.random() * 16);
      setTimeout(() => {
        setHazardActive(h => { if (h) { onLog && onLog("✓ Backed it off, good call. Momentum preserved."); return false; } return h; });
      }, 1200);
    }
  }, [done, hazardActive, lastClickTime, clickCount, progress, idealTempo, tempoWindow, baseClickValue, combo, part, skillLevel, onComplete, onLog, difficulty]);

  const flavorTexts = part.flavorText || ["Working on it..."];
  useEffect(() => {
    const iv = setInterval(() => setFlavorIdx(i => (i + 1) % flavorTexts.length), 8000);
    return () => clearInterval(iv);
  }, [flavorTexts.length]);

  const resistanceLabel = difficulty > 0.7 ? "HIGH" : difficulty > 0.4 ? "MEDIUM" : "LOW";
  const resistanceColor = difficulty > 0.7 ? "#ff4d6d" : difficulty > 0.4 ? "#f59e0b" : "#22c55e";
  const momentumColors = ["#374151", "#4b5563", "#eab308", "#f59e0b", "#22c55e", "#10b981"];

  return (
    <div style={{ padding: "16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div>
          <div className="game-condensed" style={{ fontSize: 14, color: "#9ca3af", fontWeight: 500 }}>{progress < 0.5 ? "Removing" : "Working"}: {part.name}</div>
          <div className="game-mono" style={{ fontSize: 11, color: resistanceColor }}>Resistance: {resistanceLabel}</div>
        </div>
        <div className="game-mono" style={{ fontSize: 22, fontWeight: 800, color: combo >= 2.5 ? "#10b981" : combo >= 1.5 ? "#f59e0b" : "#6b7280" }}>
          ×{combo.toFixed(1)}
        </div>
      </div>

      {/* Big click target */}
      <div
        onClick={handleClick}
        style={{
          width: "100%", height: 120, borderRadius: 10, cursor: "pointer", userSelect: "none",
          background: hazardActive ? "#ff4d6d15" : criticalFlash ? "#f59e0b20" : "#0e1220",
          border: hazardActive ? "2px solid #ff4d6d" : criticalFlash ? "2px solid #f59e0b" : "2px solid #1a1f35",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          transition: "all 0.1s", animation: hazardActive ? "hazard-pulse 0.4s infinite" : hazardFailed ? "shake 0.3s" : "none",
          transform: done ? "scale(1)" : "scale(1)",
        }}
      >
        {done ? (
          <div style={{ fontSize: 32, color: "#22c55e" }}>✓</div>
        ) : hazardActive ? (
          <>
            <div style={{ fontSize: 22, marginBottom: 4 }}>⚠️</div>
            <div className="game-condensed" style={{ fontSize: 18, fontWeight: 700, color: "#ff4d6d" }}>STUCK — HOLD</div>
            <div style={{ fontSize: 11, color: "#ff4d6d80" }}>Don't click! Wait it out.</div>
          </>
        ) : (
          <>
            <div style={{ fontSize: 32, marginBottom: 4, transition: "transform 0.1s" }}>🔧</div>
            <div className="game-condensed" style={{ fontSize: 16, fontWeight: 600, color: "#e2e8f0" }}>TAP TO WRENCH</div>
          </>
        )}
      </div>

      {/* Progress bar */}
      <div style={{ marginTop: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
          <span className="game-mono" style={{ fontSize: 11, color: "#6b7280" }}>Progress</span>
          <span className="game-mono" style={{ fontSize: 11, color: done ? "#22c55e" : "#e2e8f0" }}>{Math.round(progress * 100)}%</span>
        </div>
        <div style={{ height: 8, background: "#1a1f35", borderRadius: 4, overflow: "hidden" }}>
          <div style={{
            height: "100%", borderRadius: 4, transition: "width 0.15s ease-out",
            width: (progress * 100) + "%",
            background: criticalFlash ? "#f59e0b" : done ? "#22c55e" : progress > 0.7 ? "#22c55e" : "#4e7fff",
          }} />
        </div>
      </div>

      {/* Momentum indicator */}
      <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 8 }}>
        <span className="game-mono" style={{ fontSize: 10, color: "#6b7280", minWidth: 70 }}>Momentum</span>
        <div style={{ display: "flex", gap: 3, flex: 1 }}>
          {[0,1,2,3,4].map(i => (
            <div key={i} style={{ flex: 1, height: 6, borderRadius: 3, background: i < momentumLevel ? momentumColors[momentumLevel] : "#1a1f35", transition: "background 0.2s" }} />
          ))}
        </div>
        <span className="game-mono" style={{ fontSize: 10, color: momentumLevel >= 4 ? "#10b981" : momentumLevel >= 2 ? "#f59e0b" : "#4b5563" }}>
          {momentumLevel >= 4 ? "PERFECT" : momentumLevel >= 2 ? "GOOD" : "FIND THE RHYTHM"}
        </span>
      </div>

      {/* Flavor text */}
      <div style={{ marginTop: 14, padding: "10px 12px", background: "#0a0d14", borderRadius: 6, borderLeft: "2px solid #1a1f35" }}>
        <div style={{ fontSize: 12, color: "#6b728090", fontStyle: "italic" }}>"{flavorTexts[flavorIdx]}"</div>
      </div>
    </div>
  );
}

          {neededParts.length === 0 ? (
            <div style={{ textAlign: "center", padding: 40, color: "#4b5563", fontSize: 14 }}>No parts needed right now. Get wrenching!</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {neededParts.map(p => (
                <div key={p.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", background: "#0e1220", borderRadius: 8, border: "1px solid #1a1f35" }}>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#e2e8f0" }}>{p.name}</div>
                    <div className="game-mono" style={{ fontSize: 11, color: "#6b7280" }}>Condition: DESTROYED — must replace</div>
                  </div>
                  <button className="game-btn" onClick={() => { GameAudio.uiClick(); onBuyPart(p); }}
                    style={{ padding: "8px 16px", background: yen >= p.replaceCost ? "#f59e0b20" : "#1a1f35", color: yen >= p.replaceCost ? "#f59e0b" : "#4b5563", fontSize: 13, border: yen >= p.replaceCost ? "1px solid #f59e0b40" : "1px solid #1a1f35" }}
                    disabled={yen < p.replaceCost}>
                    ¥{p.replaceCost}
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {TOOL_SHOP.map(tool => {
            const owned = state.tools[tool.id];
            return (
              <div key={tool.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", background: "#0e1220", borderRadius: 8, border: "1px solid #1a1f35", opacity: owned ? 0.5 : 1 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "#e2e8f0" }}>{tool.name}</div>
                  <div style={{ fontSize: 11, color: "#6b7280" }}>{tool.mechanic} — {tool.effect}</div>
                </div>
                {owned ? (
                  <span className="game-mono" style={{ fontSize: 12, color: "#22c55e" }}>OWNED</span>
                ) : (
                  <button className="game-btn" onClick={() => { GameAudio.uiClick(); onBuyTool(tool); }}
                    style={{ padding: "8px 16px", background: yen >= tool.cost ? "#4e7fff18" : "#1a1f35", color: yen >= tool.cost ? "#4e7fff" : "#4b5563", fontSize: 13, border: yen >= tool.cost ? "1px solid #4e7fff40" : "1px solid #1a1f35" }}
                    disabled={yen < tool.cost}>
                    ¥{tool.cost}
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── FIRST START SEQUENCE ──
function FirstStartSequence({ partTree, vehicleName, onComplete }) {
  const [phase, setPhase] = useState("ready");
  const [crankDots, setCrankDots] = useState("");
  const [holdTime, setHoldTime] = useState(0);
  const holdRef = useRef(null);

  const startCrank = () => {
    setPhase("cranking");
    GameAudio.init();
    let dots = 0;
    const iv = setInterval(() => { dots++; setCrankDots(".".repeat(dots % 4)); }, 400);
    holdRef.current = iv;
    setTimeout(() => {
      clearInterval(iv);
      setPhase("started");
      GameAudio.engineStart();
    }, 3000);
  };
  useEffect(() => () => { if (holdRef.current) clearInterval(holdRef.current); }, []);

  if (phase === "started") {
    return (
      <div style={{ padding: "40px 24px", textAlign: "center", fontFamily: "'Barlow Condensed', sans-serif", animation: "fadeUp 0.5s ease" }}>
        <div style={{ fontSize: 14, color: "#f59e0b", letterSpacing: "4px", fontWeight: 700, marginBottom: 12 }}>═══════════════════</div>
        <div style={{ fontSize: 32, fontWeight: 800, color: "#22c55e", marginBottom: 8 }}>SHE'S ALIVE</div>
        <div style={{ fontSize: 14, color: "#f59e0b", letterSpacing: "4px", fontWeight: 700, marginBottom: 24 }}>═══════════════════</div>
        <div style={{ fontSize: 16, color: "#e2e8f0", lineHeight: 1.7, maxWidth: 500, margin: "0 auto 24px", fontStyle: "italic" }}>
          {partTree.firstStartText}
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap", marginBottom: 24 }}>
          {["🟢 Engine", "🟢 Fuel", "🟢 Cooling", "🟢 Exhaust", "🟢 Electrical", "🟢 Drivetrain"].map(s => (
            <span key={s} className="game-mono" style={{ fontSize: 11, color: "#22c55e", background: "#22c55e10", padding: "4px 10px", borderRadius: 20 }}>{s}</span>
          ))}
        </div>
        {/* Confetti */}
        <div style={{ position: "relative", height: 60, overflow: "hidden" }}>
          {Array.from({ length: 20 }, (_, i) => (
            <div key={i} style={{
              position: "absolute", width: 6, height: 6, borderRadius: "50%",
              background: ["#ff4d6d", "#f59e0b", "#22c55e", "#4e7fff", "#a855f7"][i % 5],
              left: (5 + Math.random() * 90) + "%", top: -10,
              animation: `confetti-fall ${1.5 + Math.random() * 2}s ease-in forwards`,
              animationDelay: (Math.random() * 0.5) + "s",
            }} />
          ))}
        </div>
        <button className="game-btn" onClick={onComplete} style={{ padding: "12px 28px", background: "#22c55e20", color: "#22c55e", fontSize: 15, border: "1px solid #22c55e40", marginTop: 12 }}>
          Continue to Garage →
        </button>
      </div>
    );
  }

  return (
    <div style={{ padding: "40px 24px", textAlign: "center", fontFamily: "'Barlow Condensed', sans-serif" }}>
      <div style={{ fontSize: 14, color: "#f59e0b", letterSpacing: "4px", fontWeight: 700, marginBottom: 12 }}>═══════════════════</div>
      <div style={{ fontSize: 24, fontWeight: 800, color: "#e2e8f0", marginBottom: 4 }}>READY FOR FIRST START</div>
      <div style={{ fontSize: 14, color: "#f59e0b", letterSpacing: "4px", fontWeight: 700, marginBottom: 24 }}>═══════════════════</div>

      <div style={{ fontSize: 14, color: "#9ca3af", marginBottom: 20 }}>All critical systems are go.</div>

      <div style={{ display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap", marginBottom: 32 }}>
        {["✓ Engine", "✓ Fuel", "✓ Cooling", "✓ Exhaust", "✓ Electrical", "✓ Drivetrain"].map(s => (
          <span key={s} className="game-mono" style={{ fontSize: 12, color: "#22c55e", background: "#22c55e10", padding: "4px 10px", borderRadius: 20 }}>{s}</span>
        ))}
      </div>

      <button className="game-btn" onMouseDown={startCrank} style={{
        padding: "20px 48px", fontSize: 20, fontWeight: 700,
        background: phase === "cranking" ? "#f59e0b20" : "#1a1f35",
        color: phase === "cranking" ? "#f59e0b" : "#e2e8f0",
        border: phase === "cranking" ? "2px solid #f59e0b" : "2px solid #2a2f45",
        animation: phase === "cranking" ? "crank-shake 0.15s infinite" : "none",
        cursor: phase === "cranking" ? "wait" : "pointer",
      }} disabled={phase === "cranking"}>
        {phase === "cranking" ? "Cranking" + crankDots : "🔑 TURN THE KEY"}
      </button>

      {phase === "ready" && <div style={{ fontSize: 12, color: "#4b5563", marginTop: 12 }}>Click to crank...</div>}
    </div>
  );
}

// ── WORKBENCH VIEW ──
function GameWorkbench({ state, setState, vehicleId, onBack, onNavigateShop }) {
  const vehicle = state.garage.vehicles[vehicleId];
  const partTree = AE86_DATA;
  const [selectedSystem, setSelectedSystem] = useState(null);
  const [selectedPart, setSelectedPart] = useState(null);
  const [activeMechanic, setActiveMechanic] = useState(null);
  const [repairLog, setRepairLog] = useState(state.repairLog?.slice(0, 30) || []);
  const [showFirstStart, setShowFirstStart] = useState(false);
  const [expandedSystems, setExpandedSystems] = useState({});

  if (!vehicle) return <div style={{ padding: 40, color: "#6b7280" }}>Vehicle not found.</div>;

  const systemComp = getSystemCompletion(partTree, vehicle.parts);
  const allParts = getAllParts(partTree);
  const readyForStart = isReadyForFirstStart(partTree, vehicle.parts);

  const addLog = (msg) => {
    const entry = { msg, time: Date.now() };
    setRepairLog(l => [entry, ...l].slice(0, 40));
    setState(s => ({ ...s, repairLog: [entry, ...(s.repairLog || [])].slice(0, 40) }));
  };

  const updatePart = (partId, updates) => {
    setState(s => {
      const v = { ...s.garage.vehicles[vehicleId] };
      v.parts = { ...v.parts, [partId]: { ...v.parts[partId], ...updates } };
      return { ...s, lastModified: Date.now(), garage: { ...s.garage, vehicles: { ...s.garage.vehicles, [vehicleId]: v } } };
    });
  };

  const handleRepairComplete = (partDef) => {
    const current = vehicle.parts[partDef.id];
    const gain = 0.20 + Math.random() * 0.30;
    const newCondition = Math.min(0.95, (current.condition || 0.1) + gain);
    updatePart(partDef.id, { condition: parseFloat(newCondition.toFixed(2)), repairProgress: 1 });

    setState(s => {
      const xpGain = Math.round(10 + partDef.difficulty * 30);
      const skill = { ...(s.skills?.wrench || { level: 1, xp: 0 }) };
      skill.xp += xpGain;
      const xpNeeded = skill.level * 100;
      if (skill.xp >= xpNeeded && skill.level < 20) { skill.level++; skill.xp -= xpNeeded; addLog("⬆ Wrench skill leveled up to " + skill.level + "!"); }
      const stats = { ...s.stats, totalRepairs: (s.stats?.totalRepairs || 0) + 1 };
      return { ...s, skills: { ...s.skills, wrench: skill }, stats };
    });

    if (partDef.hiddenReveal) {
      const hr = partDef.hiddenReveal;
      if (Math.random() < hr.chance) {
        const newCondition = generateArrivalCondition(partTree.rarity);
        updatePart(hr.targetPartId, { condition: newCondition, revealed: true });
        addLog("★ Discovered hidden damage: " + hr.flavorText);
      }
    }

    setActiveMechanic(null);
    setSelectedPart(null);

    const yenReward = Math.round(20 + partDef.difficulty * 50);
    setState(s => ({ ...s, currency: { ...s.currency, yen: s.currency.yen + yenReward } }));
    addLog("+ ¥" + yenReward + " earned");
  };

  const handleReplacePart = (partDef) => {
    if (state.currency.yen < partDef.replaceCost) return;
    GameAudio.uiClick();
    setState(s => ({ ...s, currency: { ...s.currency, yen: s.currency.yen - partDef.replaceCost } }));
    updatePart(partDef.id, { condition: 0.85 + Math.random() * 0.15, repairProgress: 1 });
    addLog("↻ Replaced " + partDef.name + " for ¥" + partDef.replaceCost);

    if (partDef.hiddenReveal && Math.random() < partDef.hiddenReveal.chance) {
      const nc = generateArrivalCondition(partTree.rarity);
      updatePart(partDef.hiddenReveal.targetPartId, { condition: nc, revealed: true });
      addLog("★ Discovered: " + partDef.hiddenReveal.flavorText);
    }
  };

  const handleBundleRepair = (sysId) => {
    const bundleId = sysId + "_bundle";
    const bundleDef = allParts.find(p => p.id === bundleId);
    if (!bundleDef) return;
    if (state.currency.yen < bundleDef.replaceCost) return;
    GameAudio.uiClick();
    setState(s => ({ ...s, currency: { ...s.currency, yen: s.currency.yen - bundleDef.replaceCost } }));
    updatePart(bundleId, { condition: 0.80 + Math.random() * 0.15, repairProgress: 1 });
    addLog("✓ Restored " + bundleDef.name + " for ¥" + bundleDef.replaceCost);
    const yenReward = Math.round(50 + bundleDef.difficulty * 100);
    setState(s => ({
      ...s,
      currency: { ...s.currency, yen: s.currency.yen + yenReward },
      stats: { ...s.stats, totalRepairs: (s.stats?.totalRepairs || 0) + 1 },
    }));
  };

  const handleFirstStartComplete = () => {
    setShowFirstStart(false);
    setState(s => {
      const v = { ...s.garage.vehicles[vehicleId], status: "first_started" };
      const stats = { ...s.stats, totalYenEarned: (s.stats.totalYenEarned || 0) + 2000 };
      return {
        ...s, lastModified: Date.now(),
        garage: { ...s.garage, vehicles: { ...s.garage.vehicles, [vehicleId]: v } },
        currency: { ...s.currency, yen: s.currency.yen + 2000, wrenchTokens: s.currency.wrenchTokens + 10 },
        stats,
      };
    });
    addLog("🏁 FIRST START COMPLETE! + ¥2,000 + 10 WT");
    postToFeed({ who: state.profileId, what: "first_start", detail: "Started the " + partTree.displayName + " for the first time!" });
  };

  if (showFirstStart) return <FirstStartSequence partTree={partTree} vehicleName={partTree.displayName} onComplete={handleFirstStartComplete} />;

  if (activeMechanic) {
    const partDef = allParts.find(p => p.id === activeMechanic);
    if (partDef) {
      return (
        <div style={{ fontFamily: "'Barlow Condensed', sans-serif" }}>
          <div style={{ padding: "12px 16px", borderBottom: "1px solid #1a1f35", display: "flex", alignItems: "center", gap: 12 }}>
            <button className="game-btn" onClick={() => setActiveMechanic(null)} style={{ padding: "6px 12px", background: "#1a1f35", color: "#9ca3af", fontSize: 12 }}>← Back</button>
            <span style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0" }}>{partDef.name}</span>
          </div>
          <WrenchMechanic
            part={partDef}
            difficulty={partDef.difficulty}
            skillLevel={state.skills?.wrench?.level || 1}
            onComplete={() => handleRepairComplete(partDef)}
            onLog={addLog}
          />
        </div>
      );
    }
  }

  const toggleSystem = (sysId) => setExpandedSystems(e => ({ ...e, [sysId]: !e[sysId] }));

  const dotIndicator = (pct) => {
    const filled = Math.round(pct / 20);
    return (
      <span className="game-mono" style={{ fontSize: 10, letterSpacing: 1 }}>
        {Array.from({ length: 5 }, (_, i) => (
          <span key={i} style={{ color: i < filled ? "#22c55e" : "#2a2f45" }}>●</span>
        ))}
      </span>
    );
  };

  return (
    <div className="game-workbench-layout" style={{ display: "flex", height: "100%", fontFamily: "'Barlow Condensed', sans-serif", background: "#0a0d16" }}>
      {/* Left: Systems panel */}
      <div className="game-systems-panel game-scrollbar" style={{ width: 260, minWidth: 260, borderRight: "1px solid #1a1f35", overflowY: "auto", padding: "12px 0" }}>
        <div style={{ padding: "0 14px 10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button className="game-btn" onClick={onBack} style={{ padding: "5px 10px", background: "#1a1f35", color: "#9ca3af", fontSize: 11 }}>← Garage</button>
          <span className="game-mono" style={{ fontSize: 12, color: "#f59e0b" }}>¥{state.currency.yen.toLocaleString()}</span>
        </div>
        <div style={{ padding: "0 14px 8px" }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0", marginBottom: 2 }}>{partTree.displayName}</div>
          <div className="game-mono" style={{ fontSize: 10, color: "#6b7280" }}>{partTree.engineCode}</div>
        </div>

        {readyForStart && vehicle.status !== "first_started" && (
          <div style={{ margin: "0 14px 10px", padding: "10px 14px", background: "#22c55e10", border: "1px solid #22c55e30", borderRadius: 8, cursor: "pointer" }} onClick={() => setShowFirstStart(true)}>
            <div className="game-condensed" style={{ fontSize: 14, fontWeight: 700, color: "#22c55e" }}>🔑 READY FOR FIRST START</div>
            <div style={{ fontSize: 11, color: "#22c55e80" }}>All critical systems complete!</div>
          </div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
          {partTree.systems.map(sys => {
            const comp = systemComp[sys.id] || { done: 0, total: 1, pct: 0 };
            const isCritical = CRITICAL_SYSTEMS.includes(sys.id);
            const expanded = expandedSystems[sys.id];
            const isBundle = sys.type === "bundle";
            const bundleId = sys.id + "_bundle";
            const bundleInst = vehicle.parts[bundleId];
            const bundleDone = bundleInst && (bundleInst.condition || 0) >= 0.70;

            return (
              <div key={sys.id}>
                <div onClick={() => { if (!isBundle) toggleSystem(sys.id); else if (!bundleDone) handleBundleRepair(sys.id); }}
                  style={{ padding: "8px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, background: expanded ? "#0e122080" : "transparent", transition: "background 0.15s" }}
                  onMouseOver={e => e.currentTarget.style.background = "#0e1220"}
                  onMouseOut={e => e.currentTarget.style.background = expanded ? "#0e122080" : "transparent"}>
                  {!isBundle && <span style={{ fontSize: 10, color: "#4b5563", transition: "transform 0.2s", transform: expanded ? "rotate(90deg)" : "rotate(0)" }}>▸</span>}
                  {isBundle && <span style={{ fontSize: 10, color: "#4b5563" }}>◻</span>}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: comp.pct >= 100 ? "#22c55e" : "#e2e8f0", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {comp.pct >= 100 ? "✓ " : ""}{sys.name}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      {dotIndicator(comp.pct)}
                      <span className="game-mono" style={{ fontSize: 10, color: comp.pct >= 100 ? "#22c55e" : "#6b7280" }}>{comp.pct}%</span>
                      {isCritical && <span style={{ fontSize: 8, color: "#f59e0b", background: "#f59e0b15", padding: "1px 5px", borderRadius: 8 }}>CRIT</span>}
                    </div>
                  </div>
                  {isBundle && !bundleDone && <span className="game-mono" style={{ fontSize: 10, color: "#f59e0b" }}>¥{sys.bundleCost}</span>}
                </div>

                {expanded && sys.type === "detailed" && sys.subsystems && (
                  <div style={{ paddingLeft: 24 }}>
                    {sys.subsystems.map(sub => (
                      <div key={sub.id}>
                        <div style={{ padding: "5px 14px", fontSize: 11, color: "#6b7280", fontWeight: 600, letterSpacing: "0.5px" }}>{sub.name}</div>
                        {sub.parts.map(p => {
                          const inst = vehicle.parts[p.id];
                          if (!inst || !inst.revealed) return null;
                          const ci = getConditionInfo(inst.condition);
                          const isDone = (inst.condition || 0) >= 0.70;
                          return (
                            <div key={p.id} onClick={() => { setSelectedPart(p.id); GameAudio.uiClick(); }}
                              style={{
                                padding: "6px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8,
                                background: selectedPart === p.id ? "#4e7fff10" : "transparent",
                                borderLeft: selectedPart === p.id ? "2px solid #4e7fff" : "2px solid transparent",
                              }}
                              onMouseOver={e => { if (selectedPart !== p.id) e.currentTarget.style.background = "#0e1220"; }}
                              onMouseOut={e => { if (selectedPart !== p.id) e.currentTarget.style.background = "transparent"; }}>
                              <span style={{ fontSize: 10, color: isDone ? "#22c55e" : ci.color }}>{isDone ? "✓" : "●"}</span>
                              <span style={{ fontSize: 12, color: isDone ? "#22c55e90" : "#e2e8f0", flex: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</span>
                              <span className="game-mono" style={{ fontSize: 9, color: ci.color }}>{ci.label}</span>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <div style={{ padding: "12px 14px", borderTop: "1px solid #1a1f35", marginTop: 8 }}>
          <button className="game-btn" onClick={onNavigateShop} style={{ width: "100%", padding: "8px", background: "#1a1f35", color: "#9ca3af", fontSize: 12, border: "1px dashed #2a2f45" }}>🛒 Parts Shop</button>
        </div>
      </div>

      {/* Right: Part detail + repair area */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ flex: 1, overflowY: "auto", padding: "16px 20px" }}>
          {selectedPart ? (() => {
            const partDef = allParts.find(p => p.id === selectedPart);
            const inst = vehicle.parts[selectedPart];
            if (!partDef || !inst) return null;
            const ci = getConditionInfo(inst.condition);
            const isDone = (inst.condition || 0) >= 0.70;
            const isDestroyed = inst.condition !== null && inst.condition <= 0.10;
            const canRepairThis = partDef.canRepair !== false && !isDestroyed;

            const diffDots = Math.ceil(partDef.difficulty * 5);
            return (
              <div style={{ animation: "fadeUp 0.2s ease" }}>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#e2e8f0", marginBottom: 4 }}>{partDef.name}</div>
                <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span className="game-mono" style={{ fontSize: 12, color: "#6b7280" }}>Condition:</span>
                    <span className="game-mono" style={{ fontSize: 14, fontWeight: 700, color: ci.color }}>{inst.condition !== null ? Math.round(inst.condition * 100) + "%" : "???"}</span>
                    <span className="game-mono" style={{ fontSize: 10, color: ci.color, background: ci.color + "15", padding: "2px 8px", borderRadius: 10 }}>{ci.label}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <span className="game-mono" style={{ fontSize: 11, color: "#6b7280" }}>Difficulty:</span>
                    {Array.from({ length: 5 }, (_, i) => (
                      <span key={i} style={{ fontSize: 8, color: i < diffDots ? "#f59e0b" : "#2a2f45" }}>●</span>
                    ))}
                  </div>
                </div>

                {/* Condition bar */}
                <div style={{ height: 8, background: "#1a1f35", borderRadius: 4, overflow: "hidden", marginBottom: 16 }}>
                  <div style={{ height: "100%", width: ((inst.condition || 0) * 100) + "%", background: ci.color, borderRadius: 4, transition: "width 0.4s" }} />
                </div>

                {/* Actions */}
                {isDone ? (
                  <div style={{ padding: "16px", background: "#22c55e10", borderRadius: 8, border: "1px solid #22c55e30", textAlign: "center" }}>
                    <div className="game-condensed" style={{ fontSize: 16, fontWeight: 700, color: "#22c55e" }}>✓ Part Complete</div>
                    <div style={{ fontSize: 12, color: "#22c55e80" }}>Condition is above 70% — this part is good to go.</div>
                  </div>
                ) : isDestroyed && !partDef.canRepair ? (
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <div style={{ flex: 1, padding: "12px", background: "#ff4d6d10", borderRadius: 8, border: "1px solid #ff4d6d30" }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#ff4d6d", marginBottom: 4 }}>Cannot Repair — Must Replace</div>
                      <div style={{ fontSize: 11, color: "#ff4d6d80" }}>Condition too low for repair. Buy a replacement.</div>
                    </div>
                    <button className="game-btn" onClick={() => handleReplacePart(partDef)}
                      style={{ padding: "12px 20px", background: state.currency.yen >= partDef.replaceCost ? "#f59e0b20" : "#1a1f35", color: state.currency.yen >= partDef.replaceCost ? "#f59e0b" : "#4b5563", fontSize: 14, border: "1px solid " + (state.currency.yen >= partDef.replaceCost ? "#f59e0b40" : "#1a1f35") }}

// ── MAIN GAME VIEW (router) ──
function GameView() {
  const [gameScreen, setGameScreen] = useState("picker");
  const [profileId, setProfileId] = useState(null);
  const [state, setStateRaw] = useState(null);
  const [activeCar, setActiveCar] = useState(null);
  const syncTimerRef = useRef(null);
  const stateRef = useRef(null);

  const setState = useCallback((updater) => {
    setStateRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (next) {
        next.lastModified = Date.now();
        stateRef.current = next;
        if (profileId) saveGameState(profileId, next);
      }
      return next;
    });
  }, [profileId]);

  useEffect(() => {
    if (!profileId || !stateRef.current) return;
    syncTimerRef.current = setInterval(() => {
      if (stateRef.current) syncGameToFirebase(profileId, stateRef.current);
    }, 120000);
    return () => clearInterval(syncTimerRef.current);
  }, [profileId]);

  useEffect(() => {
    const handleUnload = () => { if (profileId && stateRef.current) syncGameToFirebase(profileId, stateRef.current); };
    window.addEventListener("beforeunload", handleUnload);
    document.addEventListener("visibilitychange", () => { if (document.hidden) handleUnload(); });
    return () => window.removeEventListener("beforeunload", handleUnload);
  }, [profileId]);

  const handleSelectProfile = async (pid) => {
    setProfileId(pid);
    let s = loadGameState(pid);
    const remote = await loadGameFromFirebase(pid);
    if (remote && (!s || remote.lastModified > s.lastModified)) { s = remote; saveGameState(pid, remote); }
    if (!s) s = makeDefaultGameState(pid);
    stateRef.current = s;
    setStateRaw(s);
    setGameScreen("garage");
  };

  const handleBuyTool = (tool) => {
    if (!state || state.currency.yen < tool.cost) return;
    setState(s => ({
      ...s,
      currency: { ...s.currency, yen: s.currency.yen - tool.cost },
      tools: { ...s.tools, [tool.id]: true },
    }));
  };

  const handleBuyPart = (partDef) => {
    if (!state || state.currency.yen < partDef.replaceCost || !activeCar) return;
    setState(s => {
      const v = { ...s.garage.vehicles[activeCar] };
      v.parts = { ...v.parts, [partDef.id]: { ...v.parts[partDef.id], condition: 0.85 + Math.random() * 0.15, repairProgress: 1 } };
      return { ...s, currency: { ...s.currency, yen: s.currency.yen - partDef.replaceCost }, garage: { ...s.garage, vehicles: { ...s.garage.vehicles, [activeCar]: v } } };
    });
  };

  const goBack = () => {
    if (gameScreen === "workbench") { setGameScreen("garage"); setActiveCar(null); }
    else if (gameScreen === "shop") { if (activeCar) setGameScreen("workbench"); else setGameScreen("garage"); }
    else { setGameScreen("picker"); setProfileId(null); setStateRaw(null); }
  };

  if (gameScreen === "picker") return <GameProfilePicker onSelect={handleSelectProfile} />;
  if (!state) return <div style={{ padding: 40, textAlign: "center", color: "#6b7280", fontFamily: "'Barlow Condensed', sans-serif" }}>Loading...</div>;

  if (gameScreen === "shop") {
    const car = activeCar ? state.garage.vehicles[activeCar] : null;
    return <GameShop state={state} onBuyTool={handleBuyTool} onBuyPart={handleBuyPart} activeCar={car} partTree={AE86_DATA} onBack={goBack} />;
  }

  if (gameScreen === "workbench" && activeCar) {
    return <GameWorkbench state={state} setState={setState} vehicleId={activeCar} onBack={goBack} onNavigateShop={() => setGameScreen("shop")} />;
  }

  return <GameGarage state={state} onSelectCar={(id) => { setActiveCar(id); setGameScreen("workbench"); }} onNavigateShop={() => setGameScreen("shop")} />;
}

function App() {
  // ── ALL hooks must be declared before any conditional return ──
  const [data, setData] = useState(null);
  const [fbReady, setFbReady] = useState(false);
  const [view, setView] = useState("dashboard");
  const [activeSprint, setActiveSprint] = useState(null);
  const [showNewSprint, setShowNewSprint] = useState(false);
  const [showNewTask, setShowNewTask] = useState(false);
  const [showLogTime, setShowLogTime] = useState(null);
  const [showEditTask, setShowEditTask] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showEditSprint, setShowEditSprint] = useState(false);
  const [filterMember, setFilterMember] = useState(null);
  const [toast, setToast] = useState(null);

  // Refs — never cause re-renders, safe to read inside closures
  const saveTimer    = useRef(null);   // debounce handle
  const savingRef    = useRef(false);  // true while a Firestore write is in-flight
  const dataRef      = useRef(null);   // mirror of `data` state — always latest
  const fileInputRef = useRef(null);

  // ── Keep dataRef in sync ──
  useEffect(() => { dataRef.current = data; }, [data]);

  // ── Subscribe to main state doc ──
  useEffect(() => {
    const go = () => fsListen(snap => {
      setFbReady(true);
      // If WE are mid-save, ignore this snapshot — it's either our own echo
      // or a concurrent change that our completing save will overtake anyway.
      if (savingRef.current) return;
      if (!snap.exists() || !snap.data()?.payload) {
        // Bootstrap empty database
        const team = DEFAULT_TEAM;
        const fresh = { team, sprints: [makeDefaultSprint(team)] };
        fsSave(fresh);
        setData(fresh);
        setActiveSprint(fresh.sprints[0]?.id || null);
        return;
      }
      const raw = snap.data().payload;
      const resolved = migrate(raw);
      if (resolved?.team && resolved?.sprints) {
        setData(resolved);
        setActiveSprint(a => a || resolved.sprints[0]?.id || null);
      }
    }, err => { console.error("Firestore error:", err); setFbReady(true); });
    if (window._firebaseReady) return go();
    let unsub = null;
    const h = () => { unsub = go(); };
    window.addEventListener("firebaseReady", h, { once: true });
    return () => { window.removeEventListener("firebaseReady", h); if (unsub) unsub(); };
  }, []);

  // ── Debounced save — fires 1500ms after last local change ──
  // Only triggered by local edits; remote snapshots set data through setData
  // but savingRef will be false when they do, so no extra save fires.
  const localChangeRef = useRef(false); // flag: was this data change local?
  useEffect(() => {
    if (!data || !fbReady) return;
    if (!localChangeRef.current) { localChangeRef.current = true; return; } // skip first mount
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      savingRef.current = true;
      // Snapshot data right now — dataRef.current has the absolute latest
      const payload = { ...dataRef.current };
      fsSave(payload)
        .then(() => { savingRef.current = false; })
        .catch(err => { savingRef.current = false; console.error("Save failed:", err); });
    }, 1500);
    return () => clearTimeout(saveTimer.current);
  }, [data, fbReady]);

  // ── Derived data (all useMemo/useCallback before any return) ──
  const sprint = useMemo(() => data ? data.sprints.find(s => s.id === activeSprint) : null, [data, activeSprint]);
  const team = useMemo(() => data ? data.team : [], [data]);
  const mMap = useMemo(() => { const m = {}; team.forEach(t => { m[t.id] = t; }); return m; }, [team]);

  const uSprint = useCallback((sid, fn) => {
    setData(p => ({ ...p, sprints: p.sprints.map(s => s.id === sid ? (typeof fn === "function" ? fn(s) : { ...s, ...fn }) : s) }));
  }, []);

  const filteredTasks = useMemo(() => {
    if (!sprint) return [];
    return filterMember ? sprint.tasks.filter(t => t.assignee === filterMember) : sprint.tasks;
  }, [sprint, filterMember]);

  const stats = useMemo(() => {
    if (!sprint) return { total: 0, completed: 0, inProgress: 0, logged: 0, estimated: 0, tasks: 0, doneTasks: 0, inProgressTasks: 0 };
    const ts = sprint.tasks;
    return {
      tasks: ts.length, doneTasks: ts.filter(t => t.status === "complete").length,
      inProgressTasks: ts.filter(t => t.status === "in-progress").length,
      estimated: ts.reduce((s, t) => s + (t.estimated || 0), 0),
      logged: ts.reduce((s, t) => s + (t.logged || 0), 0),
      completed: ts.filter(t => t.status === "complete").reduce((s, t) => s + (t.estimated || 0), 0),
      inProgress: ts.filter(t => t.status === "in-progress").reduce((s, t) => s + (t.estimated || 0), 0),
    };
  }, [sprint]);

  const ganttWeeks = useMemo(() => {
    if (!sprint) return [];
    const weeks = []; const totalDays = daysBetween(sprint.startDate, sprint.endDate);
    const wLen = (sprint.weekLength || 1) * 7; const count = Math.max(1, Math.ceil(totalDays / wLen));
    for (let i = 0; i < count; i++) {
      const s = addDays(sprint.startDate, i * wLen);
      weeks.push({ start: s, end: addDays(sprint.startDate, Math.min((i + 1) * wLen - 1, totalDays)), label: "W" + (i + 1), dateLabel: fmt(s) });
    }
    return weeks;
  }, [sprint]);

  const burndownData = useMemo(() => {
    if (!sprint || stats.estimated === 0) return [];
    const totalDays = daysBetween(sprint.startDate, sprint.endDate);
    const today = todayStr();
    const totalEst = stats.estimated;
    const pts = [];
    for (let d = 0; d <= totalDays; d++) {
      const dayStr = addDays(sprint.startDate, d);
      const isInPast = dayStr <= today;
      let remaining = 0;
      sprint.tasks.forEach(t => {
        const est = t.estimated || 0;
        const logged = t.logged || 0;
        if (t.status === "complete") {
          const completedDay = t.completedAt ? t.completedAt.slice(0, 10) : t.endDate;
          if (completedDay > dayStr) remaining += est;
        } else if (t.status === "in-progress") {
          const taskStart = t.startDate <= today ? t.startDate : today;
          const daysActive = Math.max(1, daysBetween(taskStart, today));
          const daysToHere = clamp(daysBetween(taskStart, dayStr), 0, daysActive);
          const burnedByDay = logged * (daysToHere / daysActive);
          remaining += Math.max(0, est - burnedByDay);
        } else {
          remaining += est;
        }
      });
      const ideal = Math.max(0, totalEst * (1 - d / totalDays));
      pts.push({ day: dayStr, label: fmt(dayStr), ideal: Math.round(ideal * 10) / 10, actual: isInPast ? Math.round(remaining * 10) / 10 : null, isToday: dayStr === today, weekMark: d % 7 === 0 });
    }
    return pts;
  }, [sprint, stats]);

  const velocityData = useMemo(() => {
    if (!data) return [];
    return data.sprints.map(s => ({
      name: s.name,
      doneCount: s.tasks.filter(t => t.status === "complete").length,
      taskCount: s.tasks.length,
      loggedHours: s.tasks.reduce((acc, t) => acc + (t.logged || 0), 0),
      estimatedHours: s.tasks.reduce((acc, t) => acc + (t.estimated || 0), 0),
    }));
  }, [data]);

  const sprintProgress = sprint ? (stats.tasks > 0 ? Math.round(stats.doneTasks / stats.tasks * 100) : 0) : 0;

  // ── Handlers (defined after hooks, before return) ──
  const notify = useCallback((msg) => { setToast({ msg }); setTimeout(() => setToast(null), 2600); }, []);

  const cycleStatus = useCallback((tid) => {
    if (!sprint) return;
    const order = ["not-started", "in-progress", "complete"];
    uSprint(sprint.id, s => ({
      ...s,
      tasks: s.tasks.map(t => {
        if (t.id !== tid) return t;
        const next = order[(order.indexOf(t.status) + 1) % 3];
        const histEntry = { status: next, changedAt: nowESTiso() };
        return {
          ...t,
          status: next,
          completedAt: next === "complete" ? nowESTiso() : null,
          statusHistory: [...(t.statusHistory || []), histEntry],
        };
      })
    }));
  }, [sprint, uSprint]);

  const deleteTask = useCallback((tid) => {
    if (!sprint) return;
    uSprint(sprint.id, s => ({ ...s, tasks: s.tasks.filter(t => t.id !== tid).map(t => ({ ...t, deps: (t.deps || []).filter(d => d !== tid) })) }));
    notify("Task removed");
  }, [sprint, uSprint, notify]);

  const addTask = useCallback((task) => {
    if (!sprint) return;
    uSprint(sprint.id, s => ({ ...s, tasks: [...s.tasks, {
      notes: "",
      timeLogs: [],
      statusHistory: [],
      ...task,
      id: uid(),
      deps: task.deps || [],
    }] }));
    setShowNewTask(false); notify("Task added!");
  }, [sprint, uSprint, notify]);

  const updateTask = useCallback((tid, u) => {
    if (!sprint) return;
    uSprint(sprint.id, s => ({ ...s, tasks: s.tasks.map(t => t.id === tid ? { ...t, ...u } : t) }));
  }, [sprint, uSprint]);

  const logTime = useCallback((tid, hrs, note = "") => {
    if (!sprint) return;
    const entry = { id: uid(), hours: hrs, loggedAt: nowESTiso(), note };
    uSprint(sprint.id, s => ({
      ...s,
      tasks: s.tasks.map(t => t.id === tid ? {
        ...t,
        logged: (t.logged || 0) + hrs,
        timeLogs: [...(t.timeLogs || []), entry],
      } : t)
    }));
    setShowLogTime(null); notify("Logged " + hrs + "h ✓");
  }, [sprint, uSprint, notify]);

  const reorderTasks = useCallback((fromIdx, toIdx) => {
    if (!sprint) return;
    uSprint(sprint.id, s => { const ts = [...s.tasks]; const [moved] = ts.splice(fromIdx, 1); ts.splice(toIdx, 0, moved); return { ...s, tasks: ts }; });
  }, [sprint, uSprint]);

  const createSprint = useCallback((sd) => {
    const ns = { ...sd, id: uid(), tasks: [] };
    setData(p => ({ ...p, sprints: [...p.sprints, ns] }));
    setActiveSprint(ns.id); setShowNewSprint(false); notify("Sprint created!");
  }, [notify]);

  const deleteSprint = useCallback((id) => {
    setData(p => {
      const remaining = p.sprints.filter(s => s.id !== id);
      if (activeSprint === id) setActiveSprint(remaining[0]?.id || null);
      return { ...p, sprints: remaining };
    });
    notify("Sprint deleted");
  }, [activeSprint, notify]);

  const updateSprintMeta = useCallback((id, updates) => {
    uSprint(id, s => ({ ...s, ...updates }));
    setShowEditSprint(false); notify("Sprint updated!");
  }, [uSprint, notify]);

  const exportData = useCallback(() => {
    if (!data) return;
    const totalTasks = data.sprints.reduce((n, s) => n + s.tasks.length, 0);
    const totalLogs  = data.sprints.reduce((n, s) => n + s.tasks.reduce((m, t) => m + (t.timeLogs||[]).length, 0), 0);
    const meta = {
      version: 2,
      exportedAt: nowESTiso(),
      appName: "TMCC",
      summary: {
        sprints: data.sprints.length,
        tasks: totalTasks,
        teamMembers: data.team.length,
        timeLogEntries: totalLogs,
      },
      data,
    };
    const json = JSON.stringify(meta, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url;
    const ts = nowESTiso().replace("T", "_").replace(":", "-").slice(0, 16);
    a.download = "tmcc-backup-v2_" + ts + ".json";
    a.click(); URL.revokeObjectURL(url); notify("Data exported!");
  }, [data, notify]);

  const importData = useCallback((e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        // Support v2 wrapped format { version, data: {...} } and legacy v1 { team, sprints }
        const raw = (parsed.version && parsed.data) ? parsed.data : parsed;
        if (raw.team && raw.sprints) {
          const migrated = migrate(raw);

          const prev = sprint?.tasks.find(t => t.id === id);
