const fmtFull = (d) => { if (!d) return ""; const dt = new Date(d + "T00:00:00"); return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); };

const fmtDateTime = (iso) => { if (!iso) return ""; const [date, time] = iso.split("T"); const dt = new Date(date + "T00:00:00"); const d = dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }); return time ? d + " at " + time : d; };

    team: data.team,

  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)", flexShrink: 0 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth={stroke} />

        strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
        strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.5s cubic-bezier(0.4,0,0.2,1)" }} />

  );
}

// ─── PIE CHART ───
function PieChart({ slices, size = 130, label, total, unit = "" }) {
  const r = size / 2;
  const cx = r, cy = r;
  const innerR = r * 0.56;
  let cursor = -Math.PI / 2;
  const paths = slices.filter(s => s.value > 0).map(s => {
    const angle = (s.value / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(cursor);
    const y1 = cy + r * Math.sin(cursor);
    cursor += angle;
    const x2 = cx + r * Math.cos(cursor);
    const y2 = cy + r * Math.sin(cursor);
    const large = angle > Math.PI ? 1 : 0;
    return { ...s, d: `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`, angle };
  });

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 20, flex: 1 }}>
      <div style={{ position: "relative", flexShrink: 0 }}>
        <svg width={size} height={size}>
          {paths.length === 0
            ? <circle cx={cx} cy={cy} r={r} fill={T.border} />
            : paths.map((p, i) => <path key={i} d={p.d} fill={p.color} opacity={0.9} />)

          <circle cx={cx} cy={cy} r={innerR} fill={T.bgCard} />

        </svg>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 7, flex: 1 }}>
        {slices.map((s, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: s.color, flexShrink: 0 }} />
            <div style={{ display: "flex", alignItems: "center", gap: 5, flex: 1, minWidth: 0 }}>

          </div>
        ))}
      </div>
    </div>
  );
}

// ─── SMOOTH SVG PATH  (Catmull-Rom → cubic Bézier, tension 0–1) ───
// tension = 0   → straight segments (no smoothing)
// tension = 0.4 → smooth but hugs the data (default)
// tension = 1   → very loose / over-smoothed
const smoothPath = (pts, tension = 0.4) => {
  if (pts.length < 2) return "";
  if (pts.length === 2) return `M ${pts[0].x},${pts[0].y} L ${pts[1].x},${pts[1].y}`;
  const n = pts.length;
  let d = `M ${pts[0].x},${pts[0].y}`;
  for (let i = 0; i < n - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[Math.min(n - 1, i + 2)];
    // Catmull-Rom tangents → cubic Bézier control handles
    const cp1x = p1.x + (p2.x - p0.x) * tension / 2;
    const cp1y = p1.y + (p2.y - p0.y) * tension / 2;
    const cp2x = p2.x - (p3.x - p1.x) * tension / 2;
    const cp2y = p2.y - (p3.y - p1.y) * tension / 2;
    d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
  }
  return d;
};

function getZoneTime(tz) {
  const now = new Date();
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: tz, hour: "numeric", minute: "2-digit", second: "2-digit",
    hour12: true, weekday: "short",
  }).formatToParts(now);
  const get = (t) => parts.find(p => p.type === t)?.value || "";
  const rawHour = get("hour");
  const min  = get("minute");
  const sec  = get("second");
  const ampm = get("dayperiod") || get("dayPeriod") || "";
  const weekday = get("weekday");
  // derive offset label
  const fmt = new Intl.DateTimeFormat("en-US", { timeZone: tz, timeZoneName: "short" });
  const tzName = fmt.formatToParts(now).find(p => p.type === "timeZoneName")?.value || tz;
  return { time: rawHour + ":" + min, sec, ampm: ampm.toLowerCase(), weekday, tzName };
}

  );
}

// ── WRENCH WORK MECHANIC ──
function WrenchMechanic({ part, difficulty, skillLevel, onComplete, onLog }) {
  const [progress, setProgress] = useState(0);
  const [combo, setCombo] = useState(1.0);
  const [clickCount, setClickCount] = useState(0);
  const [hazardActive, setHazardActive] = useState(false);
  const [hazardFailed, setHazardFailed] = useState(false);
  const [lastClickTime, setLastClickTime] = useState(0);
  const [momentumLevel, setMomentumLevel] = useState(0);
  const [flavorIdx, setFlavorIdx] = useState(0);
  const [criticalFlash, setCriticalFlash] = useState(false);
  const [done, setDone] = useState(false);
  const nextHazardRef = useRef(15 + Math.floor(Math.random() * 16));
  const nextCriticalRef = useRef(8 + Math.floor(Math.random() * 28));
  const comboRef = useRef(1.0);

  const idealTempo = 300 - (difficulty * 120);
  const tempoWindow = 100 + (skillLevel * 8);
  const baseClickValue = (0.8 + skillLevel * 0.2) / (20 + difficulty * 40);

  const handleClick = useCallback(() => {
    if (done) return;
    GE.Audio.init();
    if (hazardActive) {
      setHazardFailed(true); setHazardActive(false);
      setCombo(1.0); comboRef.current = 1.0; setMomentumLevel(0);
      setProgress(p => Math.max(0, p - 0.05));
      GE.Audio.hazard();
      onLog && onLog("⚠ Clicked through a stuck bolt — lost momentum!");
      setTimeout(() => setHazardFailed(false), 600);
      return;
    }
    const now = performance.now();
    const dt = now - lastClickTime;
    setLastClickTime(now);
    let nc = comboRef.current;
    if (lastClickTime > 0 && Math.abs(dt - idealTempo) < tempoWindow) {
      nc = Math.min(3.0, nc + 0.25); setMomentumLevel(l => Math.min(5, l + 1));
    } else if (lastClickTime > 0) { nc = 1.0; setMomentumLevel(0); }
    setCombo(nc); comboRef.current = nc;
    const count = clickCount + 1;
    setClickCount(count);
    GE.Audio.click();
    let gain = baseClickValue * nc;
    if (count >= nextCriticalRef.current) {
      gain *= 4; setCriticalFlash(true); GE.Audio.critical();
      onLog && onLog("✦ CRACK — it broke free!");
      setTimeout(() => setCriticalFlash(false), 400);
      nextCriticalRef.current = count + 8 + Math.floor(Math.random() * 28);
    }
    const np = Math.min(1, progress + gain);
    setProgress(np);
    if (np >= 1 && !done) {
      setDone(true); GE.Audio.complete();
      onLog && onLog("✓ " + part.name + " — wrench work done!");
      setTimeout(() => onComplete && onComplete(), 500);
      return;
    }
    if (count >= nextHazardRef.current && !done && np < 0.95) {
      setHazardActive(true);
      nextHazardRef.current = count + 15 + Math.floor(Math.random() * 16);
      setTimeout(() => setHazardActive(h => { if (h) { onLog && onLog("✓ Backed it off. Momentum preserved."); return false; } return h; }), 1200);
    }
  }, [done, hazardActive, lastClickTime, clickCount, progress, idealTempo, tempoWindow, baseClickValue, part, skillLevel, onComplete, onLog, difficulty]);

  const flavorTexts = part.flavorText || ["Working on it..."];
  useEffect(() => { const iv = setInterval(() => setFlavorIdx(i => (i + 1) % flavorTexts.length), 8000); return () => clearInterval(iv); }, [flavorTexts.length]);
  const momentumColors = ["#374151","#4b5563","#eab308","#f59e0b","#22c55e","#10b981"];

  return (
    <div style={{ padding: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div>
          <div className="game-condensed" style={{ fontSize: 14, color: "#9ca3af", fontWeight: 500 }}>Wrenching: {part.name}</div>
          <div className="game-mono" style={{ fontSize: 11, color: difficulty > 0.7 ? "#ff4d6d" : difficulty > 0.4 ? "#f59e0b" : "#22c55e" }}>Resistance: {difficulty > 0.7 ? "HIGH" : difficulty > 0.4 ? "MEDIUM" : "LOW"}</div>
        </div>
        <div className="game-mono" style={{ fontSize: 22, fontWeight: 800, color: combo >= 2.5 ? "#10b981" : combo >= 1.5 ? "#f59e0b" : "#6b7280" }}>×{combo.toFixed(1)}</div>
      </div>
      <div onClick={handleClick} style={{
        width: "100%", height: 120, borderRadius: 10, cursor: "pointer", userSelect: "none",
        background: hazardActive ? "#ff4d6d15" : criticalFlash ? "#f59e0b20" : "#0e1220",
        border: hazardActive ? "2px solid #ff4d6d" : criticalFlash ? "2px solid #f59e0b" : "2px solid #1a1f35",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        transition: "all 0.1s", animation: hazardActive ? "hazard-pulse 0.4s infinite" : hazardFailed ? "shake 0.3s" : "none",
      }}>
        {done ? <div style={{ fontSize: 32, color: "#22c55e" }}>✓</div>
         : hazardActive ? (<><div style={{ fontSize: 22 }}>⚠️</div><div className="game-condensed" style={{ fontSize: 18, fontWeight: 700, color: "#ff4d6d" }}>STUCK — HOLD</div><div style={{ fontSize: 11, color: "#ff4d6d80" }}>Don't click! Wait it out.</div></>)
         : (<><div style={{ fontSize: 32, marginBottom: 4 }}>🔧</div><div className="game-condensed" style={{ fontSize: 16, fontWeight: 600, color: "#e2e8f0" }}>TAP TO WRENCH</div></>)}
      </div>
      <div style={{ marginTop: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
          <span className="game-mono" style={{ fontSize: 11, color: "#6b7280" }}>Progress</span>
          <span className="game-mono" style={{ fontSize: 11, color: done ? "#22c55e" : "#e2e8f0" }}>{Math.round(progress * 100)}%</span>
        </div>
        <div style={{ height: 8, background: "#1a1f35", borderRadius: 4, overflow: "hidden" }}>
          <div style={{ height: "100%", borderRadius: 4, transition: "width 0.15s", width: (progress*100)+"%", background: criticalFlash ? "#f59e0b" : done ? "#22c55e" : "#4e7fff" }} />
        </div>
      </div>
      <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 8 }}>
        <span className="game-mono" style={{ fontSize: 10, color: "#6b7280", minWidth: 70 }}>Momentum</span>
        <div style={{ display: "flex", gap: 3, flex: 1 }}>{[0,1,2,3,4].map(i => <div key={i} style={{ flex: 1, height: 6, borderRadius: 3, background: i < momentumLevel ? momentumColors[momentumLevel] : "#1a1f35", transition: "background 0.2s" }} />)}</div>
        <span className="game-mono" style={{ fontSize: 10, color: momentumLevel >= 4 ? "#10b981" : momentumLevel >= 2 ? "#f59e0b" : "#4b5563" }}>{momentumLevel >= 4 ? "PERFECT" : momentumLevel >= 2 ? "GOOD" : "FIND RHYTHM"}</span>
      </div>
      <div style={{ marginTop: 14, padding: "10px 12px", background: "#0a0d14", borderRadius: 6, borderLeft: "2px solid #1a1f35" }}>
        <div style={{ fontSize: 12, color: "#6b728090", fontStyle: "italic" }}>"{flavorTexts[flavorIdx]}"</div>
      </div>
    </div>
  );
}

// ── PRECISION WORK MECHANIC ──
function PrecisionMechanic({ part, difficulty, skillLevel, onComplete, onLog }) {
  const tier = GE.getSkillTier(skillLevel);
  const totalSteps = Math.max(3, Math.round(3 + difficulty * 5));
  const [step, setStep] = useState(0);
  const [results, setResults] = useState([]);
  const [sweepPos, setSweepPos] = useState(0);
  const [sweeping, setSweeping] = useState(true);
  const [flash, setFlash] = useState(null);
  const [done, setDone] = useState(false);
  const animRef = useRef(null);
  const startRef = useRef(performance.now());
  const dirRef = useRef(1);

  const greenWidth = Math.max(6, 14 - difficulty * 10 + tier.bonus * 8);
  const yellowWidth = greenWidth * 1.8;
  const sweepSpeed = (0.03 + difficulty * 0.05) * (1 - tier.bonus * 0.15);

  useEffect(() => {
    if (!sweeping || done) return;
    const animate = () => {
      setSweepPos(p => {
        let next = p + dirRef.current * sweepSpeed;
        if (next >= 100 || next <= 0) { dirRef.current *= -1; next = Math.max(0, Math.min(100, next)); }
        return next;
      });
      animRef.current = requestAnimationFrame(animate);
    };
    animRef.current = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(animRef.current);
  }, [sweeping, done, sweepSpeed]);

  const handleTap = useCallback(() => {
    if (!sweeping || done) return;
    GE.Audio.init();
    setSweeping(false);
    const greenCenter = 50;
    const dist = Math.abs(sweepPos - greenCenter);
    let result;
    if (dist <= greenWidth / 2) { result = "green"; GE.Audio.precisionHit(); setFlash("#22c55e"); }
    else if (dist <= yellowWidth / 2) { result = "yellow"; GE.Audio.uiClick(); setFlash("#eab308"); }
    else { result = "red"; GE.Audio.precisionMiss(); setFlash("#ff4d6d"); }
    const nr = [...results, result];
    setResults(nr);
    onLog && onLog(result === "green" ? "✦ Perfect torque!" : result === "yellow" ? "• Acceptable — within spec." : "✗ Miss — retorque needed.");
    setTimeout(() => {
      setFlash(null);
      if (result === "red") {
        setResults(r => { const c = [...r]; c[c.length-1] = "retry"; return c; });
      }
      if (nr.filter(r => r !== "retry").length >= totalSteps) {
        setDone(true); GE.Audio.complete();
        onLog && onLog("✓ " + part.name + " — precision work done!");
        setTimeout(() => onComplete && onComplete(nr), 500);
      } else {
        setSweepPos(Math.random() * 20);
        dirRef.current = 1;
        setSweeping(true);
        setStep(s => s + 1);
      }
    }, 600);
  }, [sweeping, done, sweepPos, results, greenWidth, yellowWidth, totalSteps, part, onComplete, onLog]);

  const goodCount = results.filter(r => r === "green").length;
  const okCount = results.filter(r => r === "yellow").length;
  const activeResults = results.filter(r => r !== "retry");

  return (
    <div style={{ padding: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
        <div>
          <div className="game-condensed" style={{ fontSize: 14, color: "#9ca3af", fontWeight: 500 }}>Torquing: {part.name}</div>
          <div className="game-mono" style={{ fontSize: 11, color: "#6b7280" }}>Step {Math.min(activeResults.length + 1, totalSteps)} / {totalSteps}</div>
        </div>
        <div className="game-mono" style={{ fontSize: 13, color: "#22c55e" }}>{goodCount}✓ {okCount}~</div>
      </div>
      {/* Sweep bar */}
      <div onClick={handleTap} style={{ position: "relative", height: 56, background: "#0e1220", borderRadius: 8, overflow: "hidden", cursor: sweeping ? "pointer" : "default", border: flash ? "2px solid " + flash : "2px solid #1a1f35", transition: "border-color 0.2s", userSelect: "none" }}>
        {/* Red zones */}
        <div style={{ position: "absolute", inset: 0, background: "#ff4d6d20" }} />
        {/* Yellow zones */}
        <div style={{ position: "absolute", top: 0, bottom: 0, left: (50 - yellowWidth/2) + "%", width: yellowWidth + "%", background: "#eab30825" }} />
        {/* Green zone */}
        <div style={{ position: "absolute", top: 0, bottom: 0, left: (50 - greenWidth/2) + "%", width: greenWidth + "%", background: "#22c55e30", borderLeft: "1px solid #22c55e50", borderRight: "1px solid #22c55e50" }} />
        {/* Sweep indicator */}
        {sweeping && <div style={{ position: "absolute", top: 4, bottom: 4, left: sweepPos + "%", width: 3, background: "#e2e8f0", borderRadius: 2, transform: "translateX(-50%)", boxShadow: "0 0 8px #e2e8f0" }} />}
        {/* Labels */}
        <div style={{ position: "absolute", bottom: 4, left: "50%", transform: "translateX(-50%)", fontSize: 9, color: "#22c55e80" }} className="game-mono">GREEN</div>
        {!sweeping && !done && <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", fontSize: 14, fontWeight: 700, color: flash || "#e2e8f0" }}>{flash === "#22c55e" ? "PERFECT" : flash === "#eab308" ? "OK" : "MISS"}</div>}
        {done && <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", fontSize: 18, fontWeight: 700, color: "#22c55e" }}>✓ COMPLETE</div>}
      </div>
      {/* Results row */}
      <div style={{ display: "flex", gap: 4, marginTop: 10, justifyContent: "center" }}>
        {Array.from({ length: totalSteps }, (_, i) => {
          const r = activeResults[i];
          const col = r === "green" ? "#22c55e" : r === "yellow" ? "#eab308" : r === "red" ? "#ff4d6d" : "#1a1f35";
          return <div key={i} style={{ width: 24, height: 24, borderRadius: 4, background: col + (r ? "" : ""), border: "1px solid " + (r ? col : "#2a2f45"), display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: r ? "#fff" : "#4b5563" }}>{r === "green" ? "✓" : r === "yellow" ? "~" : r === "red" ? "✗" : (i+1)}</div>;
        })}
      </div>
      <div style={{ marginTop: 12, fontSize: 12, color: "#6b728090", fontStyle: "italic", textAlign: "center" }}>
        {sweeping ? "Tap when the indicator is in the green zone." : done ? "All steps complete!" : "..."}
      </div>
    </div>
  );
}

// ── DIAGNOSIS MECHANIC ──
function DiagnosisMechanic({ scenario, tools, onComplete, onLog }) {
  const [revealedClues, setRevealedClues] = useState(["free"]);
  const [selected, setSelected] = useState(null);
  const [wrongGuesses, setWrongGuesses] = useState([]);
  const [solved, setSolved] = useState(false);

  const allOptions = [scenario.correctDiagnosis, ...scenario.wrongOptions];
  const allParts = GE.getAllParts(GE.getPartTree("ae86"));
  const getPartName = (id) => { const p = allParts.find(x => x.id === id); return p ? p.name : id; };

  const clueEntries = [];
  if (scenario.clues.free) scenario.clues.free.forEach(c => clueEntries.push({ type: "free", text: c, revealed: true }));
  if (scenario.clues.multimeter) clueEntries.push({ type: "multimeter", text: scenario.clues.multimeter, revealed: revealedClues.includes("multimeter"), toolName: "Multimeter" });
  if (scenario.clues.compressionTester) clueEntries.push({ type: "compressionTester", text: scenario.clues.compressionTester, revealed: revealedClues.includes("compressionTester"), toolName: "Compression Tester" });
  if (scenario.clues.boostLeakTester) clueEntries.push({ type: "boostLeakTester", text: scenario.clues.boostLeakTester, revealed: revealedClues.includes("boostLeakTester"), toolName: "Boost Leak Tester" });

  const revealClue = (type) => {
    const toolMap = { multimeter: "multimeter", compressionTester: "compression_tester", boostLeakTester: "boost_leak_tester" };
    if (tools[toolMap[type]]) { setRevealedClues(r => [...r, type]); GE.Audio.uiClick(); }
  };

  const submitDiagnosis = () => {
    if (!selected || solved || wrongGuesses.includes(selected)) return;
    GE.Audio.init();
    if (selected === scenario.correctDiagnosis) {
      setSolved(true); GE.Audio.diagCorrect();
      onLog && onLog("✓ Correct diagnosis: " + getPartName(selected));
      setTimeout(() => onComplete && onComplete(true, wrongGuesses.length), 800);
    } else {
      setWrongGuesses(w => [...w, selected]); setSelected(null);
      GE.Audio.diagWrong();
      onLog && onLog("✗ Wrong — " + getPartName(selected) + " wasn't the issue. ¥ wasted.");
    }
  };

  return (
    <div style={{ padding: 16 }}>
      <div style={{ marginBottom: 14 }}>
        <div className="game-mono" style={{ fontSize: 10, color: "#f59e0b", letterSpacing: "1.5px", marginBottom: 4 }}>DIAGNOSIS</div>
        <div className="game-condensed" style={{ fontSize: 16, fontWeight: 700, color: "#e2e8f0" }}>{scenario.symptom}</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
        {/* Clues */}
        <div>
          <div className="game-mono" style={{ fontSize: 10, color: "#6b7280", letterSpacing: "1px", marginBottom: 6 }}>CLUES</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {clueEntries.map((c, i) => (
              <div key={i} style={{ padding: "8px 10px", background: "#0e1220", borderRadius: 6, border: "1px solid #1a1f35" }}>
                {c.revealed ? (
                  <div style={{ fontSize: 12, color: "#e2e8f0" }}>{c.text}</div>
                ) : (
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "#4b5563" }}>🔒 {c.toolName} required</span>
                    {tools[{multimeter:"multimeter",compressionTester:"compression_tester",boostLeakTester:"boost_leak_tester"}[c.type]] ?
                      <button className="game-btn" onClick={() => revealClue(c.type)} style={{ padding: "3px 8px", background: "#4e7fff18", color: "#4e7fff", fontSize: 10 }}>Use</button>
                      : <span className="game-mono" style={{ fontSize: 9, color: "#4b5563" }}>Not owned</span>}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
        {/* Options */}
        <div>
          <div className="game-mono" style={{ fontSize: 10, color: "#6b7280", letterSpacing: "1px", marginBottom: 6 }}>POSSIBLE CAUSES</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {allOptions.map(opt => {
              const isWrong = wrongGuesses.includes(opt);
              const isCorrect = solved && opt === scenario.correctDiagnosis;
              const isSel = selected === opt;
              return (
                <div key={opt} onClick={() => { if (!isWrong && !solved) { setSelected(opt); GE.Audio.uiClick(); } }}
                  style={{
                    padding: "8px 10px", borderRadius: 6, cursor: isWrong || solved ? "default" : "pointer",
                    background: isCorrect ? "#22c55e18" : isWrong ? "#ff4d6d08" : isSel ? "#4e7fff15" : "#0e1220",
                    border: isCorrect ? "1px solid #22c55e50" : isWrong ? "1px solid #ff4d6d30" : isSel ? "1px solid #4e7fff50" : "1px solid #1a1f35",
                    opacity: isWrong ? 0.4 : 1,
                  }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 12, color: isCorrect ? "#22c55e" : isWrong ? "#ff4d6d" : isSel ? "#4e7fff" : "#9ca3af" }}>
                      {isCorrect ? "✓" : isWrong ? "✗" : isSel ? "●" : "○"}
                    </span>
                    <span style={{ fontSize: 13, color: isWrong ? "#4b5563" : "#e2e8f0" }}>{getPartName(opt)}</span>
                  </div>
                </div>
              );
            })}
          </div>
          {!solved && (
            <button className="game-btn" onClick={submitDiagnosis} disabled={!selected}
              style={{ marginTop: 8, width: "100%", padding: "10px", background: selected ? "#4e7fff18" : "#1a1f35", color: selected ? "#4e7fff" : "#4b5563", fontSize: 13, border: selected ? "1px solid #4e7fff40" : "1px solid #1a1f35" }}>
              Submit Diagnosis
            </button>
          )}
          {solved && <div className="game-mono" style={{ marginTop: 8, fontSize: 12, color: "#22c55e", textAlign: "center" }}>✓ Problem identified!</div>}
        </div>
      </div>
    </div>
  );
}

// ── BODYWORK MECHANIC ──
function BodyworkMechanic({ part, difficulty, skillLevel, gridSize, onComplete, onLog }) {
  const tier = GE.getSkillTier(skillLevel);
  const [rows, cols] = gridSize || [2, 3];
  const totalZones = rows * cols;
  const [zones, setZones] = useState(() => {
    return Array.from({ length: totalZones }, () => ({
      progress: 0, isRust: Math.random() < 0.25, done: false,
    }));
  });
  const [activeZone, setActiveZone] = useState(null);
  const [done, setDone] = useState(false);
  const holdRef = useRef(null);

  const fillRate = (0.02 + tier.bonus * 0.01) * (1 + skillLevel * 0.05);

  const startHold = (idx) => {
    if (done || zones[idx].done) return;
    GE.Audio.init();
    setActiveZone(idx);
    holdRef.current = setInterval(() => {
      setZones(prev => {
        const next = [...prev];
        const z = { ...next[idx] };
        const rate = z.isRust ? fillRate * 0.5 : fillRate;
        z.progress = Math.min(1, z.progress + rate);
        if (z.progress >= 1) { z.done = true; GE.Audio.uiClick(); }
        else { GE.Audio.bodyworkTick(); }
        next[idx] = z;
        const allDone = next.every(zone => zone.done);
        if (allDone) {
          clearInterval(holdRef.current);
          setTimeout(() => {
            GE.Audio.complete();
            onLog && onLog("✓ " + part.name + " — bodywork complete!");
            onComplete && onComplete();
          }, 300);
        }
        return next;
      });
    }, 60);
  };

  const stopHold = () => { clearInterval(holdRef.current); setActiveZone(null); };
  useEffect(() => () => clearInterval(holdRef.current), []);

  const doneCount = zones.filter(z => z.done).length;
  const coverage = Math.round((doneCount / totalZones) * 100);
  const allDone = doneCount === totalZones;

  return (
    <div style={{ padding: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
        <div>
          <div className="game-condensed" style={{ fontSize: 14, color: "#9ca3af", fontWeight: 500 }}>Bodywork: {part.name}</div>
          <div className="game-mono" style={{ fontSize: 11, color: "#6b7280" }}>Hold each zone to work it. Rust = 2× time.</div>
        </div>
        <div className="game-mono" style={{ fontSize: 14, fontWeight: 700, color: allDone ? "#22c55e" : "#e2e8f0" }}>{coverage}%</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(" + cols + ", 1fr)", gap: 4, marginBottom: 14 }}>
        {zones.map((z, i) => (
          <div key={i}
            onMouseDown={() => startHold(i)} onMouseUp={stopHold} onMouseLeave={stopHold}
            onTouchStart={(e) => { e.preventDefault(); startHold(i); }} onTouchEnd={stopHold}
            style={{
              height: 56, borderRadius: 6, cursor: z.done ? "default" : "pointer", position: "relative", overflow: "hidden",
              background: z.done ? "#22c55e20" : z.isRust ? "#7c2d1218" : "#0e1220",
              border: activeZone === i ? "2px solid #4e7fff" : z.done ? "2px solid #22c55e40" : z.isRust ? "2px solid #92400e40" : "2px solid #1a1f35",
              userSelect: "none", WebkitUserSelect: "none",
            }}>
            {/* Fill progress */}
            <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: (z.progress * 100) + "%", background: z.done ? "#22c55e30" : "#4e7fff20", transition: "height 0.06s linear" }} />
            <div style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%" }}>
              {z.done ? <span style={{ fontSize: 14, color: "#22c55e" }}>✓</span>
               : <><span style={{ fontSize: z.isRust ? 11 : 10, color: z.isRust ? "#92400e" : "#4b5563" }}>{z.isRust ? "🟫 RUST" : ""}</span>
                  <span className="game-mono" style={{ fontSize: 9, color: "#4b5563" }}>{Math.round(z.progress * 100)}%</span></>}
            </div>
          </div>
        ))}
      </div>
      <div style={{ fontSize: 12, color: "#6b728090", fontStyle: "italic", textAlign: "center" }}>
        {allDone ? "Surface work complete!" : "Hold on each zone until filled. Don't rush."}
      </div>
    </div>
  );
}

// ── GACHA VIEW ──
function GachaView({ state, setState, onBack, addLog }) {
  const [phase, setPhase] = useState("menu");
  const [pullResult, setPullResult] = useState(null);
  const [revealStep, setRevealStep] = useState(0);

  const wt = state.currency.wrenchTokens;
  const today = new Date().toDateString();
  const dailyUsed = state.lastDailyPull === today;

  const doPull = (cost) => {
    if (state.currency.wrenchTokens < cost) return;
    GE.Audio.init();
    const result = GE.rollGacha(state.gacha.pity4, state.gacha.pity5);
    setPullResult(result);
    setState(s => {
      const g = { ...s.gacha, totalPulls: s.gacha.totalPulls + 1 };
      g.pity4 = result.rarity >= 4 ? 0 : g.pity4 + 1;
      g.pity5 = result.rarity >= 5 ? 0 : g.pity5 + 1;
      return { ...s, currency: { ...s.currency, wrenchTokens: s.currency.wrenchTokens - cost }, gacha: g };
    });
    setPhase("walking");
    setTimeout(() => { setPhase("reveal"); setRevealStep(1); GE.Audio.gachaReveal(result.rarity); }, 2000);
  };

  const doDailyPull = () => {
    GE.Audio.init();
    const result = GE.rollDailyGacha();
    setPullResult(result);
    setState(s => ({ ...s, lastDailyPull: today }));
    setPhase("walking");
    setTimeout(() => { setPhase("reveal"); setRevealStep(1); GE.Audio.gachaReveal(result.rarity); }, 2000);
  };

  const sendToGarage = () => {
    if (!pullResult) return;
    const vId = pullResult.vehicle.id;
    const tree = GE.getPartTree(vId);
    const existingCount = Object.values(state.garage.vehicles).filter(v => v.modelId === vId).length;
    if (existingCount > 0) {
      setState(s => ({
        ...s,
        currency: { ...s.currency, donorParts: { ...s.currency.donorParts, [vId]: (s.currency.donorParts[vId] || 0) + 1 } },
      }));
      addLog && addLog("↻ Duplicate " + pullResult.vehicle.name + " → +1 Donor Part (" + vId + ")");
    } else {
      const instanceId = vId + "_" + Date.now();
      const parts = GE.initializeVehicleParts(tree);
      setState(s => ({
        ...s,
        garage: { ...s.garage, vehicles: { ...s.garage.vehicles, [instanceId]: { modelId: vId, nickname: "", acquiredAt: Date.now(), status: "in_progress", parts } } },
      }));
      addLog && addLog("🚗 " + pullResult.vehicle.name + " added to garage!");
    }
    GE.postFeed({ who: state.profileId, what: "pulled_vehicle", detail: "Pulled a " + "★".repeat(pullResult.rarity) + " " + pullResult.vehicle.name + "!" });
    setPhase("menu"); setPullResult(null); setRevealStep(0);
  };

  const rc = pullResult ? GD.RARITY_COLORS[pullResult.rarity] : "#6b7280";

  if (phase === "walking") {
    const flav = GD.PULL_FLAVOR.intro[Math.floor(Math.random() * GD.PULL_FLAVOR.intro.length)];
    return (
      <div style={{ padding: "60px 24px", textAlign: "center", fontFamily: "'Barlow Condensed', sans-serif" }}>
        <div style={{ fontSize: 16, color: "#9ca3af", marginBottom: 20 }}>{flav}</div>
        <div style={{ width: 200, height: 6, background: "#1a1f35", borderRadius: 3, margin: "0 auto", overflow: "hidden" }}>
          <div style={{ width: "100%", height: "100%", background: "#4e7fff", borderRadius: 3, animation: "progress-fill 2s ease-in-out" }} />
        </div>
      </div>
    );
  }

  if (phase === "reveal" && pullResult) {
    const flav = GD.PULL_FLAVOR[pullResult.rarity][Math.floor(Math.random() * GD.PULL_FLAVOR[pullResult.rarity].length)];
    return (
      <div style={{ padding: "40px 24px", textAlign: "center", fontFamily: "'Barlow Condensed', sans-serif", animation: "fadeUp 0.4s ease" }}>
        <div style={{ marginBottom: 12 }}>
          {Array.from({ length: pullResult.rarity }, (_, i) => (
            <span key={i} style={{ fontSize: 24, color: rc, display: "inline-block", animation: "star-in 0.3s ease", animationDelay: (i * 0.15) + "s", animationFillMode: "both" }}>★</span>
          ))}
        </div>
        <div style={{ fontSize: 11, color: rc, fontWeight: 700, letterSpacing: "2px", marginBottom: 4 }}>{GD.RARITY_NAMES[pullResult.rarity].toUpperCase()}</div>
        <div style={{ fontSize: 26, fontWeight: 800, color: "#e2e8f0", marginBottom: 4 }}>{pullResult.vehicle.name}</div>
        <div className="game-mono" style={{ fontSize: 13, color: "#6b7280", marginBottom: 16 }}>{pullResult.vehicle.engine}</div>
        <div style={{ fontSize: 13, color: "#9ca3af", fontStyle: "italic", marginBottom: 24, maxWidth: 400, margin: "0 auto 24px" }}>"{flav}"</div>
        <button className="game-btn" onClick={sendToGarage} style={{ padding: "12px 28px", background: rc + "20", color: rc, fontSize: 15, fontWeight: 700, border: "1px solid " + rc + "40" }}>
          Send to Garage →
        </button>
      </div>
    );
  }

  return (
    <div style={{ padding: "24px", fontFamily: "'Barlow Condensed', sans-serif" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
        <button className="game-btn" onClick={onBack} style={{ padding: "6px 12px", background: "#1a1f35", color: "#9ca3af", fontSize: 12 }}>← Back</button>
        <div style={{ fontSize: 20, fontWeight: 700, color: "#e2e8f0" }}>Junkyard</div>
        <div style={{ marginLeft: "auto" }} className="game-mono">
          <span style={{ color: "#a855f7", fontWeight: 700 }}>🔧 {wt} WT</span>
        </div>
      </div>

      <div style={{ maxWidth: 500, margin: "0 auto" }}>
        {/* Daily pull */}
        <div style={{ padding: "16px", background: "#0e1220", borderRadius: 10, border: "1px solid #1a1f35", marginBottom: 12 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 4 }}>Daily Junkyard Walk</div>
          <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 10 }}>Free daily pull — Common tier only.</div>
          <button className="game-btn" onClick={doDailyPull} disabled={dailyUsed}
            style={{ width: "100%", padding: "10px", background: dailyUsed ? "#1a1f35" : "#22c55e18", color: dailyUsed ? "#4b5563" : "#22c55e", fontSize: 14, border: dailyUsed ? "1px solid #1a1f35" : "1px solid #22c55e40" }}>
            {dailyUsed ? "Already walked today" : "🚶 Walk the Yard (Free)"}
          </button>
        </div>

        {/* Single pull */}
        <div style={{ padding: "16px", background: "#0e1220", borderRadius: 10, border: "1px solid #1a1f35", marginBottom: 12 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 4 }}>Single Pull</div>
          <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 10 }}>10 WT — All rarities possible.</div>
          <button className="game-btn" onClick={() => doPull(10)} disabled={wt < 10}
            style={{ width: "100%", padding: "10px", background: wt >= 10 ? "#a855f718" : "#1a1f35", color: wt >= 10 ? "#a855f7" : "#4b5563", fontSize: 14, border: wt >= 10 ? "1px solid #a855f740" : "1px solid #1a1f35" }}>
            Pull — 10 WT
          </button>
        </div>

        {/* 10-pull */}
        <div style={{ padding: "16px", background: "#0e1220", borderRadius: 10, border: "1px solid #f59e0b20", marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 4 }}>10-Pull Discount</div>
          <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 10 }}>90 WT (save 10%) — Guaranteed ★★★★+</div>
          <button className="game-btn" onClick={() => doPull(90)} disabled={wt < 90}
            style={{ width: "100%", padding: "10px", background: wt >= 90 ? "#f59e0b18" : "#1a1f35", color: wt >= 90 ? "#f59e0b" : "#4b5563", fontSize: 14, border: wt >= 90 ? "1px solid #f59e0b40" : "1px solid #1a1f35" }}>
            10-Pull — 90 WT
          </button>
        </div>

        {/* Pity info */}
        <div className="game-mono" style={{ fontSize: 11, color: "#4b5563", textAlign: "center" }}>
          Pity: ★★★★ in {20 - state.gacha.pity4} pulls · ★★★★★ in {50 - state.gacha.pity5} pulls · Total: {state.gacha.totalPulls}
        </div>
      </div>
    </div>
  );
}

  const tabBtn = (id, label) => <button className="game-btn" onClick={() => setTab(id)} style={{ padding: "8px 16px", fontSize: 13, background: tab === id ? "#4e7fff18" : "transparent", color: tab === id ? "#4e7fff" : "#6b7280", borderBottom: tab === id ? "2px solid #4e7fff" : "2px solid transparent" }}>{label}</button>;

          </div>
        ))}</div>

          const owned = state.tools[tool.id];
          return (
            <div key={tool.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", background: "#0e1220", borderRadius: 8, border: "1px solid #1a1f35", opacity: owned ? 0.5 : 1 }}>

              {owned ? <span className="game-mono" style={{ fontSize: 12, color: "#22c55e" }}>OWNED</span>
               : <button className="game-btn" onClick={() => { GE.Audio.uiClick(); onBuyTool(tool); }} style={{ padding: "8px 16px", background: yen >= tool.cost ? "#4e7fff18" : "#1a1f35", color: yen >= tool.cost ? "#4e7fff" : "#4b5563", fontSize: 13, border: yen >= tool.cost ? "1px solid #4e7fff40" : "1px solid #1a1f35" }} disabled={yen < tool.cost}>¥{tool.cost}</button>}

        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>{feed.slice(0,8).map((e,i) => {
          const pr = GD.PROFILES.find(p => p.id === e.who);
          return <div key={i} style={{ display: "flex", gap: 10, alignItems: "center", padding: "8px 12px", background: "#0e1220", borderRadius: 6, fontSize: 12, color: "#9ca3af" }}>
            <span style={{ color: pr?.color || "#6b7280", fontWeight: 700, minWidth: 50 }}>{pr?.name || e.who}</span>
            <span style={{ flex: 1 }}>{e.detail}</span></div>;
        })}</div>
      </div>}
    </div>
  );
}

// ── WORKBENCH VIEW ──
function GameWorkbench({ state, setState, vehicleId, onBack, onNavigateShop }) {
  const vehicle = state.garage.vehicles[vehicleId];
  const partTree = GE.getPartTree(vehicle?.modelId || "ae86");
  const [selectedPart, setSelectedPart] = useState(null);
  const [activeMechanic, setActiveMechanic] = useState(null);
  const [activeDiag, setActiveDiag] = useState(null);
  const [repairLog, setRepairLog] = useState(state.repairLog?.slice(0,30) || []);
  const [showFirstStart, setShowFirstStart] = useState(false);
  const [expandedSystems, setExpandedSystems] = useState({});

  if (!vehicle) return <div style={{ padding: 40, color: "#6b7280" }}>Vehicle not found.</div>;

  const systemComp = GE.getSystemCompletion(partTree, vehicle.parts);
  const allParts = GE.getAllParts(partTree);
  const readyForStart = GE.isReadyForFirstStart(partTree, vehicle.parts);

  const addLog = (msg) => {
    const entry = { msg, time: Date.now() };
    setRepairLog(l => [entry, ...l].slice(0,40));
    setState(s => ({ ...s, repairLog: [entry, ...(s.repairLog||[])].slice(0,40) }));
  };

  const updatePart = (partId, updates) => {
    setState(s => {
      const v = { ...s.garage.vehicles[vehicleId] };
      v.parts = { ...v.parts, [partId]: { ...v.parts[partId], ...updates } };
      return { ...s, lastModified: Date.now(), garage: { ...s.garage, vehicles: { ...s.garage.vehicles, [vehicleId]: v } } };
    });
  };

  const awardSkillXp = (skill, xpGain) => {
    setState(s => {
      const sk = { ...(s.skills?.[skill] || { level: 1, xp: 0 }) };
      sk.xp += xpGain;
      const needed = GE.xpForLevel(sk.level);
      if (sk.xp >= needed && sk.level < 20) { sk.level++; sk.xp -= needed; addLog("⬆ " + skill.charAt(0).toUpperCase() + skill.slice(1) + " leveled up to " + sk.level + "!"); }
      return { ...s, skills: { ...s.skills, [skill]: sk } };
    });
  };

  const handleRepairComplete = (partDef, mechResult) => {
    const current = vehicle.parts[partDef.id];
    let gain = 0.20 + Math.random() * 0.30;
    if (mechResult && Array.isArray(mechResult)) { // precision results
      const greens = mechResult.filter(r => r === "green").length;
      const total = mechResult.filter(r => r !== "retry").length;
      gain = 0.15 + (greens / Math.max(1, total)) * 0.50;
    }
    const nc = Math.min(0.95, (current.condition || 0.1) + gain);
    updatePart(partDef.id, { condition: parseFloat(nc.toFixed(2)), repairProgress: 1 });
    awardSkillXp(partDef.repairType, Math.round(10 + partDef.difficulty * 30));
    setState(s => ({ ...s, stats: { ...s.stats, totalRepairs: (s.stats?.totalRepairs || 0) + 1 } }));
    if (partDef.hiddenReveal && Math.random() < partDef.hiddenReveal.chance) {
      updatePart(partDef.hiddenReveal.targetPartId, { condition: GE.generateArrivalCondition(partTree.rarity), revealed: true });
      addLog("★ Discovered: " + partDef.hiddenReveal.flavorText);
    }
    const yen = Math.round(20 + partDef.difficulty * 50);
    setState(s => ({ ...s, currency: { ...s.currency, yen: s.currency.yen + yen } }));
    addLog("+ ¥" + yen);
    setActiveMechanic(null); setSelectedPart(null);
  };

  const handleDiagComplete = (correct, wrongCount) => {
    awardSkillXp("diagnosis", correct ? 40 : 10);
    if (wrongCount > 0) {
      const penalty = wrongCount * 50;
      setState(s => ({ ...s, currency: { ...s.currency, yen: Math.max(0, s.currency.yen - penalty) } }));
      addLog("- ¥" + penalty + " (wrong diagnosis cost)");
    }
    setActiveDiag(null);
  };

  const handleReplacePart = (partDef) => {
    if (state.currency.yen < partDef.replaceCost) return;
    GE.Audio.uiClick();
    setState(s => ({ ...s, currency: { ...s.currency, yen: s.currency.yen - partDef.replaceCost } }));
    updatePart(partDef.id, { condition: 0.85 + Math.random() * 0.15, repairProgress: 1 });
    addLog("↻ Replaced " + partDef.name + " — ¥" + partDef.replaceCost);
    if (partDef.hiddenReveal && Math.random() < partDef.hiddenReveal.chance) {
      updatePart(partDef.hiddenReveal.targetPartId, { condition: GE.generateArrivalCondition(partTree.rarity), revealed: true });
      addLog("★ " + partDef.hiddenReveal.flavorText);
    }
  };

  const handleBundleRepair = (sys) => {
    const bundleId = sys.id + "_bundle";
    const bundleDef = allParts.find(p => p.id === bundleId);
    if (!bundleDef) return;
    const inst = vehicle.parts[bundleId];
    if (inst && (inst.condition || 0) >= 0.70) return;
    if (sys.repairType === "bodywork") { setActiveMechanic(bundleId); return; }
    if (sys.repairType === "diagnosis" && partTree.diagnosticScenarios?.length) {
      const unused = partTree.diagnosticScenarios.filter(sc => !repairLog.some(l => l.msg.includes(sc.symptom.slice(0,20))));
      const sc = unused.length > 0 ? unused[Math.floor(Math.random() * unused.length)] : partTree.diagnosticScenarios[0];
      setActiveDiag(sc); return;
    }
    if (state.currency.yen < bundleDef.replaceCost) return;
    GE.Audio.uiClick();
    setState(s => ({ ...s, currency: { ...s.currency, yen: s.currency.yen - bundleDef.replaceCost } }));
    updatePart(bundleId, { condition: 0.80 + Math.random() * 0.15, repairProgress: 1 });
    addLog("✓ Restored " + bundleDef.name + " — ¥" + bundleDef.replaceCost);
    awardSkillXp(bundleDef.repairType || "wrench", 20);
  };

  const handleFirstStartComplete = () => {
    setShowFirstStart(false);
    setState(s => {
      const v = { ...s.garage.vehicles[vehicleId], status: "first_started" };
      return { ...s, lastModified: Date.now(), garage: { ...s.garage, vehicles: { ...s.garage.vehicles, [vehicleId]: v } }, currency: { ...s.currency, yen: s.currency.yen + 2000, wrenchTokens: s.currency.wrenchTokens + 10 }, stats: { ...s.stats, totalYenEarned: (s.stats.totalYenEarned||0) + 2000 } };
    });
    addLog("🏁 FIRST START! +¥2,000 +10WT");
    GE.postFeed({ who: state.profileId, what: "first_start", detail: "Started the " + partTree.displayName + "!" });
  };

  if (showFirstStart) return <FirstStartSequence partTree={partTree} onComplete={handleFirstStartComplete} />;

  if (activeDiag) return (
    <div style={{ fontFamily: "'Barlow Condensed', sans-serif" }}>
      <div style={{ padding: "12px 16px", borderBottom: "1px solid #1a1f35", display: "flex", alignItems: "center", gap: 12 }}>
        <button className="game-btn" onClick={() => setActiveDiag(null)} style={{ padding: "6px 12px", background: "#1a1f35", color: "#9ca3af", fontSize: 12 }}>← Back</button>
        <span style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0" }}>Diagnosis</span>
      </div>
      <DiagnosisMechanic scenario={activeDiag} tools={state.tools} onComplete={handleDiagComplete} onLog={addLog} />
    </div>
  );

  if (activeMechanic) {
    const partDef = allParts.find(p => p.id === activeMechanic);
    if (partDef) {
      const mechType = partDef.repairType || "wrench";
      const skillLv = state.skills?.[mechType]?.level || 1;
      return (
        <div style={{ fontFamily: "'Barlow Condensed', sans-serif" }}>
          <div style={{ padding: "12px 16px", borderBottom: "1px solid #1a1f35", display: "flex", alignItems: "center", gap: 12 }}>
            <button className="game-btn" onClick={() => setActiveMechanic(null)} style={{ padding: "6px 12px", background: "#1a1f35", color: "#9ca3af", fontSize: 12 }}>← Back</button>
            <span style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0" }}>{partDef.name}</span>
            <span className="game-mono" style={{ fontSize: 10, color: "#6b7280", marginLeft: "auto" }}>{mechType.toUpperCase()}</span>
          </div>
          {mechType === "precision" ? <PrecisionMechanic part={partDef} difficulty={partDef.difficulty} skillLevel={skillLv} onComplete={(results) => handleRepairComplete(partDef, results)} onLog={addLog} />
           : mechType === "bodywork" ? <BodyworkMechanic part={partDef} difficulty={partDef.difficulty} skillLevel={skillLv} gridSize={partDef.gridSize} onComplete={() => handleRepairComplete(partDef)} onLog={addLog} />
           : <WrenchMechanic part={partDef} difficulty={partDef.difficulty} skillLevel={skillLv} onComplete={() => handleRepairComplete(partDef)} onLog={addLog} />}
        </div>
      );
    }
  }

  const toggleSystem = (sysId) => setExpandedSystems(e => ({ ...e, [sysId]: !e[sysId] }));
  const dotIndicator = (pct) => <span className="game-mono" style={{ fontSize: 10, letterSpacing: 1 }}>{Array.from({length:5},(_,i) => <span key={i} style={{ color: i < Math.round(pct/20) ? "#22c55e" : "#2a2f45" }}>●</span>)}</span>;

  return (
    <div className="game-workbench-layout" style={{ display: "flex", height: "100%", fontFamily: "'Barlow Condensed', sans-serif", background: "#0a0d16" }}>
      {/* Systems panel */}
      <div className="game-systems-panel game-scrollbar" style={{ width: 260, minWidth: 260, borderRight: "1px solid #1a1f35", overflowY: "auto", padding: "12px 0" }}>
        <div style={{ padding: "0 14px 10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button className="game-btn" onClick={onBack} style={{ padding: "5px 10px", background: "#1a1f35", color: "#9ca3af", fontSize: 11 }}>← Garage</button>
          <span className="game-mono" style={{ fontSize: 12, color: "#f59e0b" }}>¥{state.currency.yen.toLocaleString()}</span>
        </div>
        <div style={{ padding: "0 14px 8px" }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0", marginBottom: 2 }}>{partTree.displayName}</div>
          <div className="game-mono" style={{ fontSize: 10, color: "#6b7280" }}>{partTree.engineCode}</div>
        </div>
        {readyForStart && vehicle.status !== "first_started" && (
          <div style={{ margin: "0 14px 10px", padding: "10px 14px", background: "#22c55e10", border: "1px solid #22c55e30", borderRadius: 8, cursor: "pointer" }} onClick={() => setShowFirstStart(true)}>
            <div className="game-condensed" style={{ fontSize: 14, fontWeight: 700, color: "#22c55e" }}>🔑 READY FOR FIRST START</div>
          </div>
        )}
        <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
          {partTree.systems.map(sys => {
            const comp = systemComp[sys.id] || { done: 0, total: 1, pct: 0 };
            const isCrit = GD.CRITICAL_SYSTEMS.includes(sys.id);
            const exp = expandedSystems[sys.id];
            const isBundle = sys.type === "bundle";
            const bundleInst = isBundle ? vehicle.parts[sys.id + "_bundle"] : null;
            const bundleDone = bundleInst && (bundleInst.condition || 0) >= 0.70;
            return (
              <div key={sys.id}>
                <div onClick={() => isBundle ? (!bundleDone && handleBundleRepair(sys)) : toggleSystem(sys.id)}
                  style={{ padding: "8px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, background: exp ? "#0e122080" : "transparent", transition: "background 0.15s" }}
                  onMouseOver={e => e.currentTarget.style.background = "#0e1220"} onMouseOut={e => e.currentTarget.style.background = exp ? "#0e122080" : "transparent"}>
                  <span style={{ fontSize: 10, color: "#4b5563", transition: "transform 0.2s", transform: exp ? "rotate(90deg)" : "rotate(0)" }}>{isBundle ? "◻" : "▸"}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: comp.pct >= 100 ? "#22c55e" : "#e2e8f0", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{comp.pct >= 100 ? "✓ " : ""}{sys.name}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      {dotIndicator(comp.pct)}
                      <span className="game-mono" style={{ fontSize: 10, color: comp.pct >= 100 ? "#22c55e" : "#6b7280" }}>{comp.pct}%</span>
                      {isCrit && <span style={{ fontSize: 8, color: "#f59e0b", background: "#f59e0b15", padding: "1px 5px", borderRadius: 8 }}>CRIT</span>}
                    </div>
                  </div>
                  {isBundle && !bundleDone && <span className="game-mono" style={{ fontSize: 10, color: sys.repairType === "bodywork" ? "#a855f7" : sys.repairType === "diagnosis" ? "#4e9fff" : "#f59e0b" }}>{sys.repairType === "bodywork" ? "BODY" : sys.repairType === "diagnosis" ? "DIAG" : "¥" + sys.bundleCost}</span>}
                </div>
                {exp && sys.type === "detailed" && sys.subsystems && (
                  <div style={{ paddingLeft: 24 }}>
                    {sys.subsystems.map(sub => (
                      <div key={sub.id}>
                        <div style={{ padding: "5px 14px", fontSize: 11, color: "#6b7280", fontWeight: 600, letterSpacing: "0.5px" }}>{sub.name}</div>
                        {sub.parts.map(p => {
                          const inst = vehicle.parts[p.id];
                          if (!inst || !inst.revealed) return null;
                          const ci = GE.getConditionInfo(inst.condition);
                          const isDone = (inst.condition || 0) >= 0.70;
                          const typeIcon = { wrench: "🔧", precision: "🎯", diagnosis: "🔍", bodywork: "🎨" }[p.repairType] || "🔧";
                          return (
                            <div key={p.id} onClick={() => { setSelectedPart(p.id); GE.Audio.uiClick(); }}
                              style={{ padding: "6px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, background: selectedPart === p.id ? "#4e7fff10" : "transparent", borderLeft: selectedPart === p.id ? "2px solid #4e7fff" : "2px solid transparent" }}
                              onMouseOver={e => { if (selectedPart !== p.id) e.currentTarget.style.background = "#0e1220"; }} onMouseOut={e => { if (selectedPart !== p.id) e.currentTarget.style.background = "transparent"; }}>
                              <span style={{ fontSize: 10, color: isDone ? "#22c55e" : ci.color }}>{isDone ? "✓" : "●"}</span>
                              <span style={{ fontSize: 12, color: isDone ? "#22c55e90" : "#e2e8f0", flex: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</span>
                              <span style={{ fontSize: 9 }}>{typeIcon}</span>
                              <span className="game-mono" style={{ fontSize: 9, color: ci.color }}>{ci.label}</span>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{ padding: "12px 14px", borderTop: "1px solid #1a1f35", marginTop: 8 }}>
          <button className="game-btn" onClick={onNavigateShop} style={{ width: "100%", padding: 8, background: "#1a1f35", color: "#9ca3af", fontSize: 12, border: "1px dashed #2a2f45" }}>🛒 Parts Shop</button>
        </div>
      </div>
      {/* Right panel */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ flex: 1, overflowY: "auto", padding: "16px 20px" }}>
          {selectedPart ? (() => {
            const pd = allParts.find(p => p.id === selectedPart);
            const inst = vehicle.parts[selectedPart];
            if (!pd || !inst) return null;
            const ci = GE.getConditionInfo(inst.condition);
            const isDone = (inst.condition || 0) >= 0.70;
            const isDestroyed = inst.condition !== null && inst.condition <= 0.10;
            const canRepairThis = pd.canRepair !== false && !isDestroyed;
            const dd = Math.ceil(pd.difficulty * 5);
            const typeIcon = { wrench: "🔧", precision: "🎯", diagnosis: "🔍", bodywork: "🎨" }[pd.repairType] || "🔧";
            return (
              <div style={{ animation: "fadeUp 0.2s ease" }}>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#e2e8f0", marginBottom: 4 }}>{pd.name}</div>
                <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
                  <span className="game-mono" style={{ fontSize: 14, fontWeight: 700, color: ci.color }}>{inst.condition !== null ? Math.round(inst.condition * 100) + "%" : "???"}</span>
                  <span className="game-mono" style={{ fontSize: 10, color: ci.color, background: ci.color + "15", padding: "2px 8px", borderRadius: 10 }}>{ci.label}</span>
                  <span style={{ fontSize: 11, color: "#6b7280" }}>{typeIcon} {pd.repairType}</span>
                  <span className="game-mono" style={{ fontSize: 10, color: "#6b7280" }}>Diff: {Array.from({length:5},(_,i) => <span key={i} style={{ color: i < dd ? "#f59e0b" : "#2a2f45" }}>●</span>)}</span>
                </div>
                <div style={{ height: 8, background: "#1a1f35", borderRadius: 4, overflow: "hidden", marginBottom: 16 }}>
                  <div style={{ height: "100%", width: ((inst.condition||0)*100)+"%", background: ci.color, borderRadius: 4, transition: "width 0.4s" }} />
                </div>
                {isDone ? <div style={{ padding: 16, background: "#22c55e10", borderRadius: 8, border: "1px solid #22c55e30", textAlign: "center" }}><div className="game-condensed" style={{ fontSize: 16, fontWeight: 700, color: "#22c55e" }}>✓ Part Complete</div></div>
                 : isDestroyed && !pd.canRepair ? (
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <div style={{ flex: 1, padding: 12, background: "#ff4d6d10", borderRadius: 8, border: "1px solid #ff4d6d30" }}><div style={{ fontSize: 13, fontWeight: 600, color: "#ff4d6d" }}>Cannot Repair — Must Replace</div></div>
                    <button className="game-btn" onClick={() => handleReplacePart(pd)} style={{ padding: "12px 20px", background: state.currency.yen >= pd.replaceCost ? "#f59e0b20" : "#1a1f35", color: state.currency.yen >= pd.replaceCost ? "#f59e0b" : "#4b5563", fontSize: 14, border: "1px solid " + (state.currency.yen >= pd.replaceCost ? "#f59e0b40" : "#1a1f35") }} disabled={state.currency.yen < pd.replaceCost}>Replace — ¥{pd.replaceCost}</button>
                  </div>
                 ) : (
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <button className="game-btn" onClick={() => { GE.Audio.uiClick(); setActiveMechanic(selectedPart); }} style={{ padding: "12px 24px", background: "#4e7fff18", color: "#4e7fff", fontSize: 14, fontWeight: 700, border: "1px solid #4e7fff40", flex: 1 }}>{typeIcon} Start {pd.repairType === "precision" ? "Precision" : pd.repairType === "bodywork" ? "Bodywork" : "Repair"}</button>
                    {isDestroyed && <button className="game-btn" onClick={() => handleReplacePart(pd)} style={{ padding: "12px 20px", background: "#f59e0b18", color: "#f59e0b", fontSize: 13, border: "1px solid #f59e0b40" }} disabled={state.currency.yen < pd.replaceCost}>Replace ¥{pd.replaceCost}</button>}
                  </div>
                 )}
                <div style={{ marginTop: 16, padding: "10px 14px", background: "#0a0d14", borderRadius: 6, borderLeft: "2px solid #1a1f35" }}>
                  <div style={{ fontSize: 12, color: "#6b728090", fontStyle: "italic" }}>"{(pd.flavorText||[""])[0]}"</div>
                </div>
              </div>
            );
          })() : <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", color: "#4b5563", textAlign: "center", padding: 40 }}>
            <div style={{ fontSize: 36, marginBottom: 12, opacity: 0.3 }}>🔧</div>
            <div style={{ fontSize: 15, fontWeight: 600, color: "#6b7280" }}>Select a part to inspect</div>
            <div style={{ fontSize: 12, color: "#4b5563" }}>Expand a system on the left.</div>
          </div>}
        </div>
        {/* Repair log */}
        <div className="game-scrollbar" style={{ height: 130, minHeight: 130, borderTop: "1px solid #1a1f35", overflowY: "auto", padding: "8px 16px", background: "#080b12" }}>
          <div className="game-mono" style={{ fontSize: 10, color: "#4b5563", marginBottom: 6, letterSpacing: "1px" }}>REPAIR LOG</div>
          {repairLog.length === 0 ? <div style={{ fontSize: 11, color: "#374151" }}>Start wrenching!</div>
           : repairLog.map((e,i) => <div key={i} style={{ fontSize: 11, color: e.msg.startsWith("★") ? "#f59e0b" : e.msg.startsWith("✓")||e.msg.startsWith("+") ? "#22c55e" : e.msg.startsWith("⚠")||e.msg.startsWith("⬆") ? "#f97316" : e.msg.startsWith("✗")||e.msg.startsWith("-") ? "#ff4d6d" : "#6b7280", marginBottom: 3 }}>{e.msg}</div>)}
        </div>
        {/* Skills bar */}
        <div style={{ padding: "8px 16px", borderTop: "1px solid #1a1f35", background: "#0a0d16", display: "flex", gap: 14, flexWrap: "wrap" }}>
          {[["wrench","🔧"],["precision","🎯"],["diagnosis","🔍"],["bodywork","🎨"]].map(([sk,ico]) => {
            const s = state.skills?.[sk] || { level: 1, xp: 0 };
            const tier = GE.getSkillTier(s.level);
            return <span key={sk} className="game-mono" style={{ fontSize: 11, color: s.level >= 6 ? "#f59e0b" : "#6b7280" }}>{ico} {tier.title} Lv.{s.level}</span>;
          })}
        </div>
      </div>
    </div>
  );
}

// ── GARAGE VIEW ──
function GameGarage({ state, onSelectCar, onNavigateShop, onNavigateGacha }) {
  const vehicles = state.garage?.vehicles || {};
  const entries = Object.entries(vehicles);
  return (
    <div style={{ padding: 24, fontFamily: "'Barlow Condensed', sans-serif" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 8 }}>
        <div><div style={{ fontSize: 22, fontWeight: 800, color: "#e2e8f0" }}>Your Garage</div><div className="game-mono" style={{ fontSize: 12, color: "#6b7280" }}>{entries.length} vehicle{entries.length !== 1 ? "s" : ""}</div></div>
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <span className="game-mono" style={{ fontSize: 14, color: "#f59e0b", fontWeight: 700 }}>¥{(state.currency?.yen||0).toLocaleString()}</span>
          <span className="game-mono" style={{ fontSize: 12, color: "#a855f7" }}>🔧{state.currency?.wrenchTokens||0}WT</span>
          <button className="game-btn" onClick={onNavigateGacha} style={{ padding: "7px 14px", background: "#a855f718", color: "#a855f7", fontSize: 12, border: "1px solid #a855f740" }}>🎰 Junkyard</button>
          <button className="game-btn" onClick={onNavigateShop} style={{ padding: "7px 14px", background: "#1a1f35", color: "#9ca3af", fontSize: 12, border: "1px solid #2a2f45" }}>🛒 Shop</button>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 14 }}>
        {entries.map(([id, v]) => {
          const roster = GD.VEHICLES.find(r => r.id === v.modelId);
          const tree = GE.getPartTree(v.modelId);
          const comp = GE.getSystemCompletion(tree, v.parts);
          const totalPct = Object.values(comp).reduce((s,c) => s + c.pct, 0) / Math.max(1, Object.keys(comp).length);
          const rc = GD.RARITY_COLORS[roster?.rarity || 3];
          return (
            <div key={id} onClick={() => onSelectCar(id)} style={{ background: "#0e1220", border: "1px solid #1a1f35", borderRadius: 10, padding: 18, cursor: "pointer", transition: "all 0.2s", borderLeft: "3px solid " + rc }}

                  <div style={{ fontSize: 17, fontWeight: 700, color: "#e2e8f0", marginTop: 2 }}>{roster?.name || v.modelId}</div>
                  <div className="game-mono" style={{ fontSize: 11, color: "#6b7280" }}>{roster?.engine}</div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                {Object.entries(comp).slice(0,6).map(([sId,c]) => <span key={sId} className="game-mono" style={{ fontSize: 9, padding: "2px 6px", borderRadius: 8, background: c.pct >= 100 ? "#22c55e15" : "#1a1f35", color: c.pct >= 100 ? "#22c55e" : "#6b7280" }}>{sId.slice(0,4).toUpperCase()} {c.pct}%</span>)}
              </div>
              <div style={{ height: 4, background: "#1a1f35", borderRadius: 2, overflow: "hidden" }}><div style={{ height: "100%", width: totalPct + "%", background: totalPct >= 100 ? "#22c55e" : "#4e7fff", borderRadius: 2, transition: "width 0.4s" }} /></div>
              <div className="game-mono" style={{ fontSize: 10, color: "#6b7280", marginTop: 4, textAlign: "right" }}>{Math.round(totalPct)}% {v.status === "first_started" && <span style={{ color: "#22c55e" }}>🔑 RUNNING</span>}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── MAIN GAME ROUTER ──
function GameView() {
  const [screen, setScreen] = useState("picker");
  const [profileId, setProfileId] = useState(null);
  const [state, setStateRaw] = useState(null);
  const [activeCar, setActiveCar] = useState(null);
  const syncRef = useRef(null);
  const stateRef = useRef(null);

  const setState = useCallback((updater) => {
    setStateRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (next) { next.lastModified = Date.now(); stateRef.current = next; if (profileId) GE.saveLocal(profileId, next); }
      return next;
    });
  }, [profileId]);

  useEffect(() => {
    if (!profileId || !stateRef.current) return;
    syncRef.current = setInterval(() => { if (stateRef.current) GE.syncToFirebase(profileId, stateRef.current); }, 120000);
    return () => clearInterval(syncRef.current);
  }, [profileId]);

  useEffect(() => {
    const flush = () => { if (profileId && stateRef.current) GE.syncToFirebase(profileId, stateRef.current); };
    window.addEventListener("beforeunload", flush);
    const vis = () => { if (document.hidden) flush(); };
    document.addEventListener("visibilitychange", vis);
    return () => { window.removeEventListener("beforeunload", flush); document.removeEventListener("visibilitychange", vis); };
  }, [profileId]);

  const selectProfile = async (pid) => {
    setProfileId(pid);
    let s = GE.loadLocal(pid);
    const remote = await GE.loadFromFirebase(pid);
    if (remote && (!s || remote.lastModified > s.lastModified)) { s = remote; GE.saveLocal(pid, remote); }
    if (!s) s = GE.makeDefaultState(pid);
    stateRef.current = s; setStateRaw(s); setScreen("garage");
  };

  const goBack = () => {
    if (screen === "workbench") { setScreen("garage"); setActiveCar(null); }
    else if (screen === "shop" || screen === "gacha") { if (activeCar) setScreen("workbench"); else setScreen("garage"); }
    else { setScreen("picker"); setProfileId(null); setStateRaw(null); }
  };

  const addLog = (msg) => setState(s => ({ ...s, repairLog: [{ msg, time: Date.now() }, ...(s.repairLog||[])].slice(0,40) }));

  if (screen === "picker") return <GameProfilePicker onSelect={selectProfile} />;
  if (!state) return <div style={{ padding: 40, textAlign: "center", color: "#6b7280" }}>Loading...</div>;
  if (screen === "gacha") return <GachaView state={state} setState={setState} onBack={goBack} addLog={addLog} />;
  if (screen === "shop") return <GameShop state={state} onBuyTool={(t) => { if (state.currency.yen >= t.cost) setState(s => ({ ...s, currency: { ...s.currency, yen: s.currency.yen - t.cost }, tools: { ...s.tools, [t.id]: true } })); }} onBuyPart={(p) => { if (!activeCar || state.currency.yen < p.replaceCost) return; setState(s => { const v = {...s.garage.vehicles[activeCar]}; v.parts = {...v.parts, [p.id]: {...v.parts[p.id], condition: 0.85+Math.random()*0.15, repairProgress: 1}}; return {...s, currency:{...s.currency, yen: s.currency.yen - p.replaceCost}, garage:{...s.garage, vehicles:{...s.garage.vehicles, [activeCar]: v}}}; }); }} activeCar={activeCar ? state.garage.vehicles[activeCar] : null} partTree={activeCar ? GE.getPartTree(state.garage.vehicles[activeCar]?.modelId) : null} onBack={goBack} />;
  if (screen === "workbench" && activeCar) return <GameWorkbench state={state} setState={setState} vehicleId={activeCar} onBack={goBack} onNavigateShop={() => setScreen("shop")} />;
  return <GameGarage state={state} onSelectCar={(id) => { setActiveCar(id); setScreen("workbench"); }} onNavigateShop={() => setScreen("shop")} onNavigateGacha={() => setScreen("gacha")} />;
}
